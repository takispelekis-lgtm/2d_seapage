<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEEPAGE CAD</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (για να τρέξει το JSX κατευθείαν στον browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Ενσωμάτωση των εικονιδίων Lucide ως React Components ---
        const Activity = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Play = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const Pause = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
        const Undo2 = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>;
        const Trash2 = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const Plus = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const Minus = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const Maximize = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;
        const ClipboardList = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
        const Magnet = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 15-4-4 6.75-6.77a7.79 7.79 0 0 1 11 11L13 22l-4-4 6.39-6.36a2.14 2.14 0 0 0-3-3L6 15"/></svg>;
        const MousePointer2 = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></svg>;
        const PenTool = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>;
        const Calculator = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const X = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Hand = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 7.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 9.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 11a2 2 0 1 1 4 0v6.5a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/><path d="M6 10.5V5a2 2 0 0 1 2-2v0a2 2 0 0 1 2 2v0"/></svg>;

        // --- Physical Constants ---
        const CANVAS_RES_X = 1000;
        const CANVAS_RES_Y = 500;

        // Material/Cell Types
        const MAT_SOIL_UNIT = 'soil_unit';    
        const MAT_SOIL_DEFAULT = 'soil_def'; 
        const MAT_SOIL_CLAY = 'soil_clay';    
        const MAT_SOIL_SAND = 'soil_sand';    
        const MAT_IMPERMEABLE = 'impermeable';
        const MAT_WATER = 'water';

        // Base permeability (ky)
        const K_VALUES = {
            [MAT_SOIL_UNIT]: 1.0,
            [MAT_SOIL_DEFAULT]: 0.1,
            [MAT_SOIL_CLAY]: 0.0001, 
            [MAT_SOIL_SAND]: 1000.0, 
            [MAT_IMPERMEABLE]: 0.0
        };

        const K_DISPLAY = {
            [MAT_SOIL_UNIT]: '1',
            [MAT_SOIL_DEFAULT]: '10⁻¹',
            [MAT_SOIL_CLAY]: '10⁻⁴',
            [MAT_SOIL_SAND]: '10³',
            [MAT_IMPERMEABLE]: '0'
        };

        // Anisotropy Ratios (kx / ky)
        const ANISO_RATIOS = {
            [MAT_SOIL_UNIT]: 1.0,
            [MAT_SOIL_DEFAULT]: 2.0,
            [MAT_SOIL_CLAY]: 5.0, 
            [MAT_SOIL_SAND]: 1.0, 
            [MAT_IMPERMEABLE]: 1.0,
            [MAT_WATER]: 1.0
        };

        const interpColor = (ratio, c1, c2, c3) => {
            const t = ratio < 0.5 ? ratio * 2 : (ratio - 0.5) * 2;
            const start = ratio < 0.5 ? c1 : c2, end = ratio < 0.5 ? c2 : c3;
            const r = Math.round(start[0] + t * (end[0] - start[0]));
            const g = Math.round(start[1] + t * (end[1] - start[1]));
            const b = Math.round(start[2] + t * (end[2] - start[2]));
            return `rgb(${r}, ${g}, ${b})`;
        };
        const cHead = r => interpColor(r, [186,230,253], [108,144,200], [30,58,138]);
        const cVel = r => interpColor(r, [255,255,255], [252,211,77], [220,38,38]);
        const cPress = r => interpColor(r, [207,250,254], [59,130,246], [126,34,206]);

        function App() {
            // --- React State for UI ---
            const [uiState, setUiState] = useState({
                toolMode: 'select', 
                selectedElementIndex: null, 
                domainWidth: 100,
                meshRes: 100, 
                selectedMaterial: MAT_SOIL_DEFAULT,
                drawMode: 'polygon', 
                strokeWidth: 2,
                snapEnabled: true,
                isSolving: true, 
                isDrawingPolygon: false, 
                numStreamlines: 5,
                numEquipotentials: 15,
                showHeatmap: true,
                heatmapType: 'head',
                showFlowLines: true,
                showEquipotentials: true,
                showLabels: true,
                showCircles: false,
                anisotropyEnabled: false,
                transformX: false,
                showPressures: false,
                showQModal: false,
                isResultsBoxOpen: false,
            });

            // Immutable ref to always hold the freshest state for the game loops
            const ui = useRef(uiState);
            
            // Custom setter that updates both the ref synchronously and triggers re-render
            const setUi = useCallback((updater) => {
                const next = typeof updater === 'function' ? updater(ui.current) : { ...ui.current, ...updater };
                ui.current = next;
                setUiState(next);
            }, []);

            const [results, setResults] = useState({ q: 0, iMax: 0, fs: 0 });
            const [legend, setLegend] = useState({ min: '-', max: '-' });

            // --- DOM Refs ---
            const cursorXRef = useRef(null);
            const cursorValRef = useRef(null);
            const errorTextRef = useRef(null);
            const canvasRef = useRef(null);
            const wrapperRef = useRef(null);
            const rulerCanvasRef = useRef(null);
            const reqRef = useRef(null);

            // --- Simulation Engine State ---
            const sim = useRef({
                geometryChanged: true, 
                DOMAIN_WIDTH: 100,
                DOMAIN_HEIGHT: 50,
                GRID_W: 100,
                GRID_H: 50,
                zoomLevel: 1.0,
                panOffset: { x: 0, y: 0 },
                isPanning: false,
                isSpacePressed: false,
                lastPanPoint: null, // Προσθήκη για tablet panning
                hasResults: false, 
                
                history: [], // Προσθήκη συστήματος ιστορικού για UNDO
                snapshotBeforeDrag: null, // Αποθήκευση κατάστασης πριν την έναρξη του drag

                dominantRatio: 1.0,
                dominantK: 1.0,

                elements: [
                    { type: 'polygon', material: MAT_SOIL_UNIT, points: [
                        {x: 0, z: 46}, {x: 49, z: 46}, {x: 49, z: 25}, {x: 100, z: 25}, {x: 100, z: 0}, {x: 0, z: 0}
                    ]},
                    { type: 'polygon', material: MAT_IMPERMEABLE, points: [
                        {x: 49, z: 50}, {x: 52, z: 50}, {x: 52, z: 20}, {x: 49, z: 20}
                    ]},
                    { type: 'line', material: MAT_WATER, width: 2, x1: 0, z1: 40, x2: 49, z2: 40, headValue: 40 },
                    { type: 'line', material: MAT_WATER, width: 2, x1: 52, z1: 25, x2: 100, z2: 25, headValue: 25 },
                ],
                currentElement: null, 
                activePolygon: null,  
                
                isDraggingElement: false,
                dragStartPos: {x: 0, z: 0},
                dragElementStart: null,
                draggedPointIndex: null,
                dragMoved: false,
                velocityProbes: [],

                cursorPos: { x: 0, z: 0 },
                iteration: 0,
                maxError: 0,
                systemFlux: 0,
                minHead: 0, maxHead: 50,
                minPress: 0, maxPress: 0,
                maxVel: 0,
                
                gridK: Array(100).fill().map(() => Array(50).fill(0)),
                gridRatio: Array(100).fill().map(() => Array(50).fill(1.0)),
                gridHeads: Array(100).fill().map(() => Array(50).fill(0)),
                gridFixed: Array(100).fill().map(() => Array(50).fill(false))
            });

            const getTransformFactor = useCallback(() => {
                if (ui.current.anisotropyEnabled && ui.current.transformX && sim.current.dominantRatio > 0) {
                    return Math.sqrt(1 / sim.current.dominantRatio);
                }
                return 1.0;
            }, []);

            // =========================================================================
            // 0. RULERS ENGINE (Tablet / CSS scaling adjusted)
            // =========================================================================
            const drawRulers = useCallback(() => {
                const rCanvas = rulerCanvasRef.current;
                const canvas = canvasRef.current;
                if (!rCanvas || !canvas) return;
                
                const ctx = rCanvas.getContext('2d');
                const rRect = rCanvas.getBoundingClientRect();
                const cRect = canvas.getBoundingClientRect();
                
                if (rCanvas.width !== rRect.width || rCanvas.height !== rRect.height) {
                    rCanvas.width = rRect.width;
                    rCanvas.height = rRect.height;
                }

                ctx.clearRect(0, 0, rCanvas.width, rCanvas.height);
                const R_SIZE = 24; 
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(0, 0, rCanvas.width, R_SIZE); 
                ctx.fillRect(0, rCanvas.height - R_SIZE, rCanvas.width, R_SIZE); 
                ctx.fillRect(0, 0, R_SIZE, rCanvas.height); 
                ctx.fillRect(rCanvas.width - R_SIZE, 0, R_SIZE, rCanvas.height); 

                ctx.strokeStyle = '#cbd5e1'; 
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, R_SIZE); ctx.lineTo(rCanvas.width, R_SIZE);
                ctx.moveTo(0, rCanvas.height - R_SIZE); ctx.lineTo(rCanvas.width, rCanvas.height - R_SIZE);
                ctx.moveTo(R_SIZE, 0); ctx.lineTo(R_SIZE, rCanvas.height);
                ctx.moveTo(rCanvas.width - R_SIZE, 0); ctx.lineTo(rCanvas.width - R_SIZE, rCanvas.height);
                ctx.stroke();

                ctx.fillStyle = '#475569'; 
                ctx.strokeStyle = '#94a3b8'; 
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const domainW = sim.current.DOMAIN_WIDTH;
                const domainH = sim.current.DOMAIN_HEIGHT;
                const zoomLevel = sim.current.zoomLevel;
                const panOffset = sim.current.panOffset;
                const tf = getTransformFactor();
                
                const calcStep = (ppm) => {
                    const idealStep = 80 / ppm;
                    const order = Math.floor(Math.log10(idealStep));
                    const mag = Math.pow(10, order);
                    const norm = idealStep / mag;
                    if (norm < 1.5) return 1 * mag;
                    if (norm < 3) return 2 * mag;
                    if (norm < 7) return 5 * mag;
                    return 10 * mag;
                };

                const formatNum = (num, stp) => {
                    if (stp >= 1) return Math.round(num).toString();
                    if (stp >= 0.1) return num.toFixed(1);
                    return num.toFixed(2);
                };

                // Υπολογισμός κλιμάκωσης CSS προς Εσωτερικές Διαστάσεις
                const scaleX_css = CANVAS_RES_X / cRect.width;
                const scaleY_css = CANVAS_RES_Y / cRect.height;

                const mapXToPixel = (x) => {
                    const px_unzoomed = (x / domainW) * CANVAS_RES_X * tf;
                    const x_internal = px_unzoomed * zoomLevel + panOffset.x;
                    return (x_internal / scaleX_css) + (cRect.left - rRect.left);
                };

                const mapZToPixel = (z) => {
                    const py_unzoomed = ((domainH - z) / domainH) * CANVAS_RES_Y;
                    const y_internal = py_unzoomed * zoomLevel + panOffset.y;
                    return (y_internal / scaleY_css) + (cRect.top - rRect.top);
                };

                const pixelToMapX = (px_ruler) => {
                    const x_css = px_ruler - (cRect.left - rRect.left);
                    const x_internal = x_css * scaleX_css;
                    const px_unzoomed = (x_internal - panOffset.x) / zoomLevel;
                    return (px_unzoomed / (CANVAS_RES_X * tf)) * domainW;
                };

                const pixelToMapZ = (py_ruler) => {
                    const y_css = py_ruler - (cRect.top - rRect.top);
                    const y_internal = y_css * scaleY_css;
                    const py_unzoomed = (y_internal - panOffset.y) / zoomLevel;
                    return domainH - (py_unzoomed / CANVAS_RES_Y) * domainH;
                };

                // --- X AXIS RULER ---
                const ppmX = (cRect.width * zoomLevel * tf) / domainW;
                const stepX = calcStep(ppmX);

                const startXMap = pixelToMapX(R_SIZE);
                const endXMap = pixelToMapX(rCanvas.width - R_SIZE);
                const minX = Math.min(startXMap, endXMap);
                const maxX = Math.max(startXMap, endXMap);
                const firstTickX = Math.ceil(minX / stepX) * stepX;
                
                ctx.beginPath();
                for (let x = firstTickX; x <= maxX; x += stepX) {
                    const px = mapXToPixel(x);
                    if (px >= R_SIZE && px <= rCanvas.width - R_SIZE) {
                        ctx.moveTo(px, R_SIZE); ctx.lineTo(px, R_SIZE - 6);
                        ctx.fillText(formatNum(x, stepX), px, R_SIZE / 2);
                        ctx.moveTo(px, rCanvas.height - R_SIZE); ctx.lineTo(px, rCanvas.height - R_SIZE + 6);
                        ctx.fillText(formatNum(x, stepX), px, rCanvas.height - R_SIZE / 2);
                    }
                }
                ctx.stroke();

                // --- Z AXIS RULER ---
                const ppmZ = (cRect.height * zoomLevel) / domainH;
                const stepZ = calcStep(ppmZ);

                const startZMap = pixelToMapZ(R_SIZE);
                const endZMap = pixelToMapZ(rCanvas.height - R_SIZE);
                const minZ = Math.min(startZMap, endZMap);
                const maxZ = Math.max(startZMap, endZMap);
                const firstTickZ = Math.ceil(minZ / stepZ) * stepZ;
                
                ctx.beginPath();
                for (let z = firstTickZ; z <= maxZ; z += stepZ) {
                    const pz = mapZToPixel(z);
                    if (pz >= R_SIZE && pz <= rCanvas.height - R_SIZE) {
                        ctx.moveTo(R_SIZE, pz); ctx.lineTo(R_SIZE - 6, pz);
                        ctx.save();
                        ctx.translate(R_SIZE / 2, pz);
                        ctx.rotate(-Math.PI / 2);
                        ctx.fillText(formatNum(z, stepZ), 0, 0);
                        ctx.restore();
                        
                        ctx.moveTo(rCanvas.width - R_SIZE, pz); ctx.lineTo(rCanvas.width - R_SIZE + 6, pz);
                        ctx.save();
                        ctx.translate(rCanvas.width - R_SIZE / 2, pz);
                        ctx.rotate(Math.PI / 2);
                        ctx.fillText(formatNum(z, stepZ), 0, 0);
                        ctx.restore();
                    }
                }
                ctx.stroke();

                // Corner overlaps to prevent text overlap
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.fillRect(0, 0, R_SIZE, R_SIZE);
                ctx.fillRect(rCanvas.width - R_SIZE, 0, R_SIZE, R_SIZE);
                ctx.fillRect(0, rCanvas.height - R_SIZE, R_SIZE, R_SIZE);
                ctx.fillRect(rCanvas.width - R_SIZE, rCanvas.height - R_SIZE, R_SIZE, R_SIZE);
                
                ctx.strokeStyle = '#cbd5e1';
                ctx.strokeRect(0, 0, R_SIZE, R_SIZE);
                ctx.strokeRect(rCanvas.width - R_SIZE, 0, R_SIZE, R_SIZE);
                ctx.strokeRect(0, rCanvas.height - R_SIZE, R_SIZE, R_SIZE);
                ctx.strokeRect(rCanvas.width - R_SIZE, rCanvas.height - R_SIZE, R_SIZE, R_SIZE);
            }, [getTransformFactor]);

            useEffect(() => {
                const resizeObserver = new ResizeObserver(() => drawRulers());
                if (rulerCanvasRef.current && rulerCanvasRef.current.parentElement) {
                    resizeObserver.observe(rulerCanvasRef.current.parentElement);
                }
                return () => resizeObserver.disconnect();
            }, [drawRulers]);

            // =========================================================================
            // 1. ΒΟΗΘΗΤΙΚΕΣ ΜΑΘΗΜΑΤΙΚΕΣ ΣΥΝΑΡΤΗΣΕΙΣ
            // =========================================================================
            const metersToGrid = useCallback((mx, mz) => {
                const { GRID_W, GRID_H, DOMAIN_WIDTH, DOMAIN_HEIGHT } = sim.current;
                const gx = Math.floor((mx / DOMAIN_WIDTH) * GRID_W);
                const gy = Math.floor(((DOMAIN_HEIGHT - mz) / DOMAIN_HEIGHT) * GRID_H);
                return { x: gx, y: gy };
            }, []);

            const getHeadAt = useCallback((gx, gy) => {
                const { gridHeads, GRID_W, GRID_H } = sim.current;
                const clampX = (val) => Math.max(0, Math.min(GRID_W - 1, val));
                const clampY = (val) => Math.max(0, Math.min(GRID_H - 1, val));
                
                const ix = Math.floor(gx), iy = Math.floor(gy);
                const fx = gx - ix, fy = gy - iy;
                
                const h00 = gridHeads[clampX(ix)][clampY(iy)]; 
                const h10 = gridHeads[clampX(ix+1)][clampY(iy)];
                const h01 = gridHeads[clampX(ix)][clampY(iy+1)];
                const h11 = gridHeads[clampX(ix+1)][clampY(iy+1)];

                return h00*(1-fx)*(1-fy) + h10*fx*(1-fy) + h01*(1-fx)*fy + h11*fx*fy;
            }, []);

            const getPressureAt = useCallback((gx, gy) => {
                const h = getHeadAt(gx, gy);
                if (h <= -9000) return -9999;
                const { GRID_H, DOMAIN_HEIGHT } = sim.current;
                const z = DOMAIN_HEIGHT - (gy + 0.5) * (DOMAIN_HEIGHT / GRID_H);
                return (h - z) * 10;
            }, [getHeadAt]);

            const getContinuousVelocityAt = useCallback((gx, gy) => {
                const { gridK, gridRatio, gridFixed, GRID_W, GRID_H } = sim.current;
                const clampX = (v) => Math.max(0, Math.min(GRID_W - 1, v));
                const clampY = (v) => Math.max(0, Math.min(GRID_H - 1, v));
                
                const ix = clampX(Math.floor(gx));
                const iy = clampY(Math.floor(gy));
                const Ky = gridK[ix][iy];
                if (Ky <= 0) return {x:0, y:0, k:0};

                const h0 = getHeadAt(gx, gy);
                if (h0 <= -9000) return {x:0, y:0, k:0};

                const eps = 0.5;
                let hx1 = getHeadAt(gx + eps, gy);
                let hx2 = getHeadAt(gx - eps, gy);
                let hy1 = getHeadAt(gx, gy + eps);
                let hy2 = getHeadAt(gx, gy - eps);

                const isImpermeable = (cx, cy) => {
                    const idx = Math.floor(cx);
                    const idy = Math.floor(cy);
                    if (idy >= GRID_H) return true; 
                    if (idy < 0) return false;      
                    if (idx < 0) return true;       
                    if (idx >= GRID_W) return true; 
                    return gridK[idx][idy] === 0 && !gridFixed[idx][idy]; 
                };

                if (isImpermeable(gx + eps, gy)) hx1 = h0;
                if (isImpermeable(gx - eps, gy)) hx2 = h0;
                if (isImpermeable(gx, gy + eps)) hy1 = h0;
                if (isImpermeable(gx, gy - eps)) hy2 = h0;

                let dh_dx = (hx1 - hx2) / (2 * eps);
                let dh_dy = (hy1 - hy2) / (2 * eps);

                const ratio = ui.current.anisotropyEnabled ? gridRatio[ix][iy] : 1.0;
                const Kx = Ky * ratio;

                return { x: -Kx * dh_dx, y: -Ky * dh_dy, k: Ky };
            }, [getHeadAt]);

            const getVelocityMagAt = useCallback((gx, gy) => {
                const v = getContinuousVelocityAt(gx, gy);
                return Math.sqrt(v.x*v.x + v.y*v.y);
            }, [getContinuousVelocityAt]);

            // =========================================================================
            // 2. ΣΥΝΑΡΤΗΣΕΙΣ ΑΠΟΤΕΛΕΣΜΑΤΩΝ & UI
            // =========================================================================
            const calculateResults = useCallback(() => {
                if (!sim.current.hasResults && !ui.current.isSolving) {
                    setResults(prev => (prev.q === 0 && prev.iMax === 0 && prev.fs === 0) ? prev : { q: 0, iMax: 0, fs: 0 });
                    return;
                }

                const { systemFlux, gridFixed, gridK, GRID_W, GRID_H } = sim.current;
                let maxExitGrad = 0;
                for(let x=1; x<GRID_W-1; x++){
                    for(let y=1; y<GRID_H-1; y++){
                        if(!gridFixed[x][y] && gridK[x][y] > 0) {
                            if (gridFixed[x][y-1]) {
                                const v = getVelocityMagAt(x, y);
                                const i = v / gridK[x][y];
                                if (i > maxExitGrad) maxExitGrad = i;
                            }
                        }
                    }
                }
                const fs = maxExitGrad > 0.001 ? 1.0 / maxExitGrad : 0;
                
                setResults(prev => {
                    if (Math.abs(prev.q - systemFlux) < 1e-9 && Math.abs(prev.iMax - maxExitGrad) < 1e-6 && Math.abs(prev.fs - fs) < 1e-4) {
                        return prev;
                    }
                    return { q: systemFlux, iMax: maxExitGrad, fs: fs };
                });
            }, [getVelocityMagAt]);

            const updateHighFreqUI = useCallback(() => {
                if (errorTextRef.current) errorTextRef.current.innerText = `Err: ${sim.current.maxError.toExponential(1)}`;
                if (cursorXRef.current) cursorXRef.current.innerText = `X=${sim.current.cursorPos.x.toFixed(2)} Z=${sim.current.cursorPos.z.toFixed(2)}`;
                
                let u_val = 0;
                const { DOMAIN_WIDTH, DOMAIN_HEIGHT, GRID_W, GRID_H, gridK, gridFixed } = sim.current;
                const gx = (sim.current.cursorPos.x / DOMAIN_WIDTH) * GRID_W;
                const gy = ((DOMAIN_HEIGHT - sim.current.cursorPos.z) / DOMAIN_HEIGHT) * GRID_H;
                
                if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
                    const ix = Math.floor(gx), iy = Math.floor(gy);
                    if (gridK[ix][iy] > 0 || gridFixed[ix][iy]) { 
                        const h_cursor = getHeadAt(gx, gy);
                        if (h_cursor > -9000) {
                            u_val = (h_cursor - sim.current.cursorPos.z) * 10; 
                        }
                    }
                }
                if (cursorValRef.current) cursorValRef.current.innerText = `u=${u_val.toFixed(1)} kPa`;
            }, [getHeadAt]);

            // =========================================================================
            // 3. ΣΥΝΑΡΤΗΣΕΙΣ RASTERIZATION (Δημιουργία Πλέγματος)
            // =========================================================================
            const rasterize = useCallback(() => {
                const isGeoChange = sim.current.geometryChanged;
                sim.current.geometryChanged = false;

                if (isGeoChange) {
                    sim.current.velocityProbes = [];
                }

                if (!isGeoChange && sim.current.hasResults) return; 

                const { GRID_W, GRID_H, DOMAIN_HEIGHT } = sim.current;
                const K = Array(GRID_W).fill().map(() => Array(GRID_H).fill(0));
                const R = Array(GRID_W).fill().map(() => Array(GRID_H).fill(1.0)); 
                const Fixed = Array(GRID_W).fill().map(() => Array(GRID_H).fill(false));
                const Heads = sim.current.gridHeads; 
                
                if (isGeoChange) {
                    for(let x=0; x<GRID_W; x++) for(let y=0; y<GRID_H; y++) Heads[x][y] = 0;
                }

                let localMin = 999, localMax = -999, hasWater = false;
                const waterLevels = Array(GRID_W).fill(-1);

                const drawLineOnGrid = (l) => {
                    const dx = sim.current.DOMAIN_WIDTH / GRID_W; 
                    const dy = DOMAIN_HEIGHT / GRID_H;
                    const buff = l.width + 2;
                    const minX = Math.min(l.x1, l.x2) - buff;
                    const maxX = Math.max(l.x1, l.x2) + buff;
                    const minZ = Math.min(l.z1, l.z2) - buff;
                    const maxZ = Math.max(l.z1, l.z2) + buff;
                    const { x: gx1, y: gyMax } = metersToGrid(minX, minZ); 
                    const { x: gx2, y: gyMin } = metersToGrid(maxX, maxZ); 

                    for(let x = Math.max(0, gx1); x <= Math.min(GRID_W-1, gx2); x++) {
                        for(let y = Math.max(0, gyMin); y <= Math.min(GRID_H-1, gyMax); y++) {
                            const cx = (x + 0.5) * dx;
                            const cz = DOMAIN_HEIGHT - (y + 0.5) * dy;
                            const A = cx - l.x1, B = cz - l.z1;
                            const C = l.x2 - l.x1, D = l.z2 - l.z1;
                            const dot = A * C + B * D;
                            const len_sq = C * C + D * D;
                            let param = -1;
                            if (len_sq !== 0) param = dot / len_sq;
                            let xx, zz;
                            if (param < 0) { xx = l.x1; zz = l.z1; }
                            else if (param > 1) { xx = l.x2; zz = l.z2; }
                            else { xx = l.x1 + param * C; zz = l.z1 + param * D; }
                            const dist = Math.hypot(cx - xx, cz - zz);

                            if (dist <= l.width / 2) {
                                K[x][y] = l.material === MAT_IMPERMEABLE ? -1 : K_VALUES[l.material];
                                R[x][y] = ANISO_RATIOS[l.material];
                                Fixed[x][y] = false; 
                            }
                        }
                    }
                };

                const drawPolygonOnGrid = (poly) => {
                    if (poly.points.length < 3) return;
                    const dx = sim.current.DOMAIN_WIDTH / GRID_W; 
                    const dy = DOMAIN_HEIGHT / GRID_H;
                    const minX = Math.min(...poly.points.map(p => p.x));
                    const maxX = Math.max(...poly.points.map(p => p.x));
                    const minZ = Math.min(...poly.points.map(p => p.z));
                    const maxZ = Math.max(...poly.points.map(p => p.z));
                    
                    const { x: gx1, y: gyMax } = metersToGrid(minX, minZ); 
                    const { x: gx2, y: gyMin } = metersToGrid(maxX, maxZ);
                    
                    for(let x = Math.max(0, gx1); x <= Math.min(GRID_W-1, gx2); x++) {
                        for(let y = Math.max(0, gyMin); y <= Math.min(GRID_H-1, gyMax); y++) {
                            const cx = (x + 0.5) * dx;
                            const cz = DOMAIN_HEIGHT - (y + 0.5) * dy;
                            
                            let inside = false;
                            for (let i = 0, j = poly.points.length - 1; i < poly.points.length; j = i++) {
                                const xi = poly.points[i].x, yi = poly.points[i].z;
                                const xj = poly.points[j].x, yj = poly.points[j].z;
                                const intersect = ((yi > cz) !== (yj > cz)) && (cx < (xj - xi) * (cz - yi) / (yj - yi) + xi);
                                if (intersect) inside = !inside;
                            }
                            
                            if (inside) {
                                K[x][y] = poly.material === MAT_IMPERMEABLE ? -1 : K_VALUES[poly.material];
                                R[x][y] = ANISO_RATIOS[poly.material];
                                Fixed[x][y] = false; 
                            }
                        }
                    }
                };

                sim.current.elements.forEach(el => {
                    if (el.type === 'line' && el.material !== MAT_WATER) drawLineOnGrid(el);
                    else if (el.type === 'polygon') drawPolygonOnGrid(el);
                });
                if (sim.current.currentElement && sim.current.currentElement.type === 'line' && sim.current.currentElement.material !== MAT_WATER) {
                    drawLineOnGrid(sim.current.currentElement);
                }

                const processWaterLine = (el) => {
                    const minX = Math.min(el.x1, el.x2);
                    const maxX = Math.max(el.x1, el.x2);
                    const z = el.z1; 
                    const dx = sim.current.DOMAIN_WIDTH / GRID_W;
                    const gx1 = Math.max(0, Math.floor(minX / dx));
                    const gx2 = Math.min(GRID_W - 1, Math.ceil(maxX / dx));
                    for (let x = gx1; x <= gx2; x++) {
                        waterLevels[x] = Math.max(waterLevels[x], z);
                        hasWater = true;
                    }
                };

                sim.current.elements.forEach(el => {
                    if (el.type === 'line' && el.material === MAT_WATER) processWaterLine(el);
                });
                if (sim.current.currentElement && sim.current.currentElement.type === 'line' && sim.current.currentElement.material === MAT_WATER) {
                    processWaterLine(sim.current.currentElement);
                }

                for (let x = 0; x < GRID_W; x++) {
                    if (waterLevels[x] > -1) {
                        for (let y = 0; y < GRID_H; y++) {
                            const cellBottomZ = DOMAIN_HEIGHT - (y + 1) * (DOMAIN_HEIGHT / GRID_H);
                            const cellTopZ = DOMAIN_HEIGHT - y * (DOMAIN_HEIGHT / GRID_H);
                            
                            if (waterLevels[x] < cellTopZ && waterLevels[x] >= cellBottomZ) {
                                if (K[x][y] !== -1) { 
                                    Fixed[x][y] = true;
                                    Heads[x][y] = waterLevels[x];
                                    if (waterLevels[x] > localMax) localMax = waterLevels[x];
                                    if (waterLevels[x] < localMin) localMin = waterLevels[x];
                                }
                            } else if (cellTopZ <= waterLevels[x] + 0.001) {
                                if (K[x][y] > 0 || K[x][y] === -1) break;
                                Fixed[x][y] = true;
                                Heads[x][y] = waterLevels[x];
                                if (waterLevels[x] > localMax) localMax = waterLevels[x];
                                if (waterLevels[x] < localMin) localMin = waterLevels[x];
                            }
                        }
                    }
                }

                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        if (K[x][y] === -1) K[x][y] = 0;
                    }
                }

                // --- Calculate Dominant Material properties ---
                let maxCount = 0, domRatio = 1.0, domK = K_VALUES[MAT_SOIL_UNIT];
                const counts = {};
                for(let x=0; x<GRID_W; x++) {
                    for(let y=0; y<GRID_H; y++) {
                        if(K[x][y] > 0) {
                            const key = K[x][y] + '_' + R[x][y];
                            counts[key] = (counts[key] || 0) + 1;
                            if(counts[key] > maxCount) {
                                maxCount = counts[key];
                                domK = K[x][y];
                                domRatio = R[x][y];
                            }
                        }
                    }
                }
                sim.current.dominantK = domK;
                sim.current.dominantRatio = domRatio;

                if (isGeoChange) {
                    const initHead = hasWater ? (localMin + localMax) / 2 : 0;
                    for (let x = 0; x < GRID_W; x++) {
                        for (let y = 0; y < GRID_H; y++) {
                            // Give ALL un-fixed cells (even dead ones inside the wall) the hydrostatic level to avoid 0 readings during dragging/drawing
                            if (!Fixed[x][y]) Heads[x][y] = initHead;
                        }
                    }
                }

                if (hasWater) {
                    sim.current.minHead = localMin; sim.current.maxHead = localMax;
                } else {
                    sim.current.minHead = 0; sim.current.maxHead = 50;
                }
                sim.current.gridK = K;
                sim.current.gridRatio = R;
                sim.current.gridFixed = Fixed;
            }, [metersToGrid]);

            // =========================================================================
            // 4. ΣΥΝΑΡΤΗΣΕΙΣ ΥΠΟΛΟΓΙΣΜΟΥ ΓΡΑΜΜΩΝ ΡΟΗΣ/ΙΣΟΔΥΝΑΜΙΚΩΝ
            // =========================================================================
            const getStreamlines = useCallback(() => {
                const numChannels = Math.max(1, ui.current.numStreamlines); 
                const numLinesToDraw = numChannels - 1;
                if (numLinesToDraw <= 0) {
                    sim.current.systemFlux = 0; 
                    return [];
                }
                const { gridHeads, gridK, gridFixed, GRID_W, GRID_H } = sim.current;
                const paths = [];
                const scaleX = CANVAS_RES_X / GRID_W;
                const scaleY = CANVAS_RES_Y / GRID_H;
                const inletCells = [];
                let totalFlux = 0;

                for(let x=0; x<GRID_W; x++){
                    for(let y=0; y<GRID_H; y++){
                       if (!gridFixed[x][y] && gridK[x][y] > 0) {
                           let cellFlux = 0;
                           let seedX = x + 0.5; let seedY = y + 0.5;
                           
                           if (y > 0 && gridFixed[x][y-1] && gridHeads[x][y-1] > gridHeads[x][y]) {
                               cellFlux += gridK[x][y] * (gridHeads[x][y-1] - gridHeads[x][y]);
                               seedY = y; 
                           } else if (x > 0 && gridFixed[x-1][y] && gridHeads[x-1][y] > gridHeads[x][y]) {
                               cellFlux += gridK[x][y] * (gridHeads[x-1][y] - gridHeads[x][y]);
                               seedX = x; 
                           } else if (x < GRID_W-1 && gridFixed[x+1][y] && gridHeads[x+1][y] > gridHeads[x][y]) {
                               cellFlux += gridK[x][y] * (gridHeads[x+1][y] - gridHeads[x][y]);
                               seedX = x + 1; 
                           } else if (y < GRID_H-1 && gridFixed[x][y+1] && gridHeads[x][y+1] > gridHeads[x][y]) {
                               cellFlux += gridK[x][y] * (gridHeads[x][y+1] - gridHeads[x][y]);
                               seedY = y + 1; 
                           }
                           
                           if (cellFlux > 0) {
                               inletCells.push({x: seedX, y: seedY, flux: cellFlux});
                               totalFlux += cellFlux;
                           }
                       }
                    }
                }
                
                sim.current.systemFlux = totalFlux; 
                inletCells.sort((a, b) => a.x - b.x); 
                const seeds = [];
                
                if (inletCells.length > 0 && totalFlux > 0) {
                    const targetFluxStep = totalFlux / numChannels;
                    let currentCumulativeFlux = 0;
                    let targetFlux = targetFluxStep;
                    let currentSeedCount = 0;
                    for (let i = 0; i < inletCells.length; i++) {
                        const cell = inletCells[i];
                        const nextCumulativeFlux = currentCumulativeFlux + cell.flux;
                        while (targetFlux <= nextCumulativeFlux && currentSeedCount < numLinesToDraw) {
                            const fraction = cell.flux > 0 ? (targetFlux - currentCumulativeFlux) / cell.flux : 0.5;
                            const finalX = cell.x % 1 === 0 ? cell.x : Math.floor(cell.x) + fraction;
                            const finalY = cell.y % 1 === 0 ? cell.y : Math.floor(cell.y) + fraction;
                            seeds.push({x: finalX, y: finalY});
                            targetFlux += targetFluxStep;
                            currentSeedCount++;
                        }
                        currentCumulativeFlux = nextCumulativeFlux;
                    }
                }

                const isWall = (px, py) => {
                    const ix = Math.floor(Math.max(0, Math.min(GRID_W - 1, px)));
                    const iy = Math.floor(Math.max(0, Math.min(GRID_H - 1, py)));
                    return gridK[ix][iy] === 0 && !gridFixed[ix][iy];
                };

                seeds.forEach(seed => {
                    let cx = seed.x, cy = seed.y;
                    const path = [];
                    
                    path.push({x: cx * scaleX, y: cy * scaleY});
                    let steps = 0;
                    const dt = 0.25; 

                    while(steps < 6000) { 
                        let v1 = getContinuousVelocityAt(cx, cy);
                        if (v1.k === 0 || Math.hypot(v1.x, v1.y) < 1e-12) break;
                        
                        let mag1 = Math.hypot(v1.x, v1.y);
                        let dx1 = (v1.x / mag1) * dt;
                        let dy1 = (v1.y / mag1) * dt;

                        let midX = cx + dx1 * 0.5;
                        let midY = cy + dy1 * 0.5;
                        
                        let v2 = getContinuousVelocityAt(midX, midY);
                        let dx2 = dx1, dy2 = dy1;
                        if (v2.k !== 0) {
                            let mag2 = Math.hypot(v2.x, v2.y);
                            if (mag2 > 1e-12) {
                                dx2 = (v2.x / mag2) * dt;
                                dy2 = (v2.y / mag2) * dt;
                            }
                        }

                        let nx = cx + dx2;
                        let ny = cy + dy2;

                        if (nx < 0 || nx > GRID_W || ny < 0 || ny > GRID_H) {
                            path.push({x: Math.max(0, Math.min(GRID_W, nx)) * scaleX, y: Math.max(0, Math.min(GRID_H, ny)) * scaleY});
                            break;
                        }

                        if (isWall(nx, ny)) {
                            if (!isWall(nx, cy)) {
                                ny = cy; 
                            } else if (!isWall(cx, ny)) {
                                nx = cx; 
                            } else {
                                break; 
                            }
                        }

                        cx = nx; cy = ny;
                        path.push({x: cx * scaleX, y: cy * scaleY});
                        if (gridFixed[Math.floor(Math.max(0, Math.min(GRID_W-1, cx)))][Math.floor(Math.max(0, Math.min(GRID_H-1, cy)))]) break; 
                        steps++;
                    }
                    if(path.length > 1) paths.push(path);
                });
                return paths;
            }, [getContinuousVelocityAt]);

            const getSmoothedContourLines = useCallback((threshold, dataFunc) => {
                const { GRID_W, GRID_H } = sim.current;
                const lines = [];
                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        const getSafeK = (cx, cy) => {
                            const clampedX = Math.max(0, Math.min(GRID_W - 1, cx));
                            const clampedY = Math.max(0, Math.min(GRID_H - 1, cy));
                            return sim.current.gridK[clampedX][clampedY];
                        };

                        const hasSoil = (getSafeK(x, y) > 0) || (getSafeK(x+1, y) > 0) || (getSafeK(x+1, y+1) > 0) || (getSafeK(x, y+1) > 0);
                        if (!hasSoil) continue; 

                        const v0 = dataFunc(x, y), v1 = dataFunc(x+1, y), v2 = dataFunc(x+1, y+1), v3 = dataFunc(x, y+1);
                        
                        if (v0 <= -9000 || v1 <= -9000 || v2 <= -9000 || v3 <= -9000) continue;

                        let state = 0;
                        if (v0 >= threshold) state |= 8;
                        if (v1 >= threshold) state |= 4;
                        if (v2 >= threshold) state |= 2;
                        if (v3 >= threshold) state |= 1;
                        if (state === 0 || state === 15) continue;

                        const getT = (val1, val2) => Math.abs(val2 - val1) < 1e-12 ? 0.5 : (threshold - val1) / (val2 - val1);
                        
                        const p0 = { x: x + getT(v0, v1), y: y };     
                        const p1 = { x: x + 1, y: y + getT(v1, v2) }; 
                        const p2 = { x: x + getT(v3, v2), y: y + 1 }; 
                        const p3 = { x: x, y: y + getT(v0, v3) };     

                        let a, b;
                        switch (state) {
                            case 1:  a=p3; b=p2; break; case 2:  a=p1; b=p2; break; case 3:  a=p3; b=p1; break; case 4:  a=p0; b=p1; break;
                            case 5:  a=p0; b=p3; lines.push({p1:p1, p2:p2}); break; case 6:  a=p0; b=p2; break; case 7:  a=p3; b=p0; break;
                            case 8:  a=p3; b=p0; break; case 9:  a=p0; b=p2; break; case 10: a=p0; b=p1; lines.push({p1:p3, p2:p2}); break; 
                            case 11: a=p0; b=p1; break; case 12: a=p3; b=p1; break; case 13: a=p1; b=p2; break; case 14: a=p3; b=p2; break;
                        }
                        if (state !== 5 && state !== 10 && a && b) lines.push({p1:a, p2:b});
                    }
                }
                return lines;
            }, []);

            const drawContourAndLabel = useCallback((ctx, segments, valueStr, isThick, showLabelText) => {
                if (segments.length === 0) return;
                const { GRID_W, GRID_H } = sim.current;
                const scaleX = CANVAS_RES_X / GRID_W, scaleY = CANVAS_RES_Y / GRID_H;
                const zL = sim.current.zoomLevel;
                const tf = getTransformFactor();

                ctx.beginPath();
                segments.forEach(l => { ctx.moveTo(l.p1.x * scaleX, l.p1.y * scaleY); ctx.lineTo(l.p2.x * scaleX, l.p2.y * scaleY); });
                ctx.lineWidth = (isThick ? 2.0 : 1.5) / zL;
                ctx.strokeStyle = '#000000';
                ctx.stroke();

                if (!showLabelText || !valueStr) return;

                let bestSeg = null, bestScore = -Infinity;
                const cx = GRID_W / 2, cy = GRID_H / 2;
                
                const step = Math.max(1, Math.floor(segments.length / 50)); 
                for(let i = 0; i < segments.length; i += step) {
                    const l = segments[i];
                    const mx = (l.p1.x + l.p2.x) / 2, my = (l.p1.y + l.p2.y) / 2;
                    const imx = Math.floor(mx), imy = Math.floor(my);

                    let minDistToWall = 8;
                    for (let r = 1; r <= 8; r++) {
                        let hitWall = false;
                        for(let dx = -r; dx <= r; dx++) {
                            for(let dy = -r; dy <= r; dy++) {
                                if (Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
                                const nx = imx + dx, ny = imy + dy;
                                if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H || sim.current.gridK[nx][ny] === 0 || sim.current.gridHeads[nx][ny] <= -9000) {
                                    hitWall = true; break;
                                }
                            }
                            if(hitWall) break;
                        }
                        if(hitWall) { minDistToWall = r; break; }
                    }

                    const distToCenter = Math.hypot(mx - cx, my - cy);
                    const score = (minDistToWall * 100) - distToCenter;

                    if (score > bestScore) {
                        bestScore = score; 
                        bestSeg = {x: mx, y: my}; 
                    }
                }

                if (!bestSeg && segments.length > 0) {
                    const mid = segments[Math.floor(segments.length / 2)];
                    bestSeg = {x: (mid.p1.x + mid.p2.x)/2, y: (mid.p1.y + mid.p2.y)/2};
                }

                if (bestSeg && valueStr) {
                    const lx = bestSeg.x * scaleX, ly = bestSeg.y * scaleY;
                    ctx.save();
                    ctx.font = `bold ${12/zL}px sans-serif`;
                    const width = ctx.measureText(valueStr).width + 6/zL;
                    
                    ctx.translate(lx, ly);
                    ctx.scale(1/tf, 1);
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.85)';
                    ctx.fillRect(-width/2, -7/zL, width, 14/zL);
                    ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(valueStr, 0, 0);
                    ctx.restore();
                }
            }, [getTransformFactor]);

            // =========================================================================
            // 5. ΚΥΡΙΑ ΣΥΝΑΡΤΗΣΗ ΣΧΕΔΙΑΣΗΣ (DRAW)
            // =========================================================================
            const draw = useCallback(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                const currentUi = ui.current; // Φρέσκο state

                ctx.clearRect(0, 0, CANVAS_RES_X, CANVAS_RES_Y);
                
                const { gridK, gridFixed, gridHeads, elements, currentElement, activePolygon, GRID_W, GRID_H } = sim.current;
                const cellScaleX = CANVAS_RES_X / GRID_W, cellScaleY = CANVAS_RES_Y / GRID_H;
                const showResults = currentUi.isSolving || sim.current.hasResults; 
                const zL = sim.current.zoomLevel;
                const tf = getTransformFactor();

                ctx.save();
                ctx.translate(sim.current.panOffset.x, sim.current.panOffset.y);
                ctx.scale(zL * tf, zL);

                // Vector Background Grid
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.08)';
                ctx.lineWidth = 1 / zL;
                ctx.beginPath();
                for (let i = 1; i < 10; i++) {
                    ctx.moveTo((i * CANVAS_RES_X) / 10, 0);
                    ctx.lineTo((i * CANVAS_RES_X) / 10, CANVAS_RES_Y);
                }
                for (let i = 1; i < 5; i++) {
                    ctx.moveTo(0, (i * CANVAS_RES_Y) / 5);
                    ctx.lineTo(CANVAS_RES_X, (i * CANVAS_RES_Y) / 5);
                }
                ctx.stroke();

                // Λεπτή Γραμμή για τα Όρια Ενεργής Σχεδίασης (Canvas Boundary)
                ctx.save();
                ctx.strokeStyle = '#94a3b8'; // Διακριτικό γκρι-μπλε (Slate-400)
                ctx.lineWidth = 1 / zL;
                ctx.strokeRect(0, 0, CANVAS_RES_X, CANVAS_RES_Y);
                ctx.restore();

                let localMinPress = 9999, localMaxPress = -9999, sumVel = 0, countVel = 0;
                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        if (gridK[x][y] > 0 || gridFixed[x][y]) {
                            const u = getPressureAt(x, y);
                            if (gridHeads[x][y] > 0.1 || gridFixed[x][y]) {
                                if (u < localMinPress) localMinPress = u;
                                if (u > localMaxPress) localMaxPress = u;
                            }
                            if (!gridFixed[x][y] && x>0 && x<GRID_W-1 && y>0 && y<GRID_H-1 && gridK[x][y] > 0) {
                                const mag = getVelocityMagAt(x, y);
                                if (mag > 0) { sumVel += mag; countVel++; }
                            }
                        }
                    }
                }
                if (localMaxPress > -9000) { sim.current.minPress = Math.max(0, localMinPress); sim.current.maxPress = localMaxPress; }
                sim.current.maxVel = (countVel > 0 ? sumVel / countVel : 0) * 3.0;

                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        const k = gridK[x][y];
                        if (k > 0) { 
                            const cell_z = sim.current.DOMAIN_HEIGHT - (y + 0.5) * (sim.current.DOMAIN_HEIGHT / GRID_H);
                            const isWet = gridHeads[x][y] >= cell_z;
                            const showHeatmapCell = currentUi.heatmapType === 'head' ? isWet : true;

                            if (currentUi.showHeatmap && showResults && showHeatmapCell) { 
                                let ratio = 0;
                                if (currentUi.heatmapType === 'head') {
                                    ratio = Math.max(0, Math.min(1, (gridHeads[x][y] - sim.current.minHead) / (sim.current.maxHead - sim.current.minHead || 1)));
                                    ratio = Math.floor(ratio * currentUi.numEquipotentials) / Math.max(1, currentUi.numEquipotentials);
                                    ctx.fillStyle = cHead(ratio);
                                } else if (currentUi.heatmapType === 'pressure') {
                                    const u = getPressureAt(x, y);
                                    const bandedU = Math.floor(u / 50) * 50;
                                    ratio = Math.max(0, Math.min(1, (bandedU - sim.current.minPress) / (sim.current.maxPress - sim.current.minPress || 1)));
                                    ctx.fillStyle = cPress(ratio);
                                } else {
                                    ratio = Math.min(1, Math.pow((sim.current.maxVel > 0 ? getVelocityMagAt(x, y) / sim.current.maxVel : 0), 0.5));
                                    ratio = Math.floor(ratio * 10) / 10;
                                    ctx.fillStyle = cVel(ratio);
                                }
                            } else {
                                if (k === K_VALUES[MAT_SOIL_CLAY]) ctx.fillStyle = '#a8a29e'; 
                                else if (k === K_VALUES[MAT_SOIL_SAND]) ctx.fillStyle = '#fcd34d'; 
                                else if (k === K_VALUES[MAT_SOIL_UNIT]) ctx.fillStyle = '#a7f3d0';
                                else ctx.fillStyle = '#d6c0a6'; 
                            }
                            ctx.fillRect(x * cellScaleX, y * cellScaleY, cellScaleX + 0.5/(zL*tf), cellScaleY + 0.5/zL); 
                        } else if (gridFixed[x][y]) { 
                            if (!currentUi.showHeatmap || !showResults) {
                                ctx.fillStyle = 'rgba(59, 130, 246, 0.15)'; 
                                ctx.fillRect(x * cellScaleX, y * cellScaleY, cellScaleX + 0.5/(zL*tf), cellScaleY + 0.5/zL); 
                            } else {
                                ctx.fillStyle = 'rgba(59, 130, 246, 0.25)'; 
                                ctx.fillRect(x * cellScaleX, y * cellScaleY, cellScaleX + 0.5/(zL*tf), cellScaleY + 0.5/zL);
                            }
                        }
                    }
                }

                const drawSingleElement = (el, index, isPreview = false) => {
                    const scX = CANVAS_RES_X / sim.current.DOMAIN_WIDTH;
                    const scY = CANVAS_RES_Y / sim.current.DOMAIN_HEIGHT;
                    const isSelected = currentUi.toolMode === 'select' && index === currentUi.selectedElementIndex;
                    
                    if (el.type === 'line') {
                        if (currentUi.showHeatmap && showResults && [MAT_SOIL_SAND, MAT_SOIL_CLAY, MAT_SOIL_DEFAULT, MAT_SOIL_UNIT].includes(el.material)) {
                            ctx.beginPath();
                            ctx.moveTo(el.x1 * scX, CANVAS_RES_Y - el.z1 * scY); 
                            ctx.lineTo(el.x2 * scX, CANVAS_RES_Y - el.z2 * scY);
                            ctx.lineCap = 'round';
                            ctx.lineWidth = 1.5 / zL;
                            ctx.strokeStyle = 'rgb(120, 100, 80)';
                            ctx.stroke();
                            return; 
                        }
                        ctx.beginPath();
                        ctx.moveTo(el.x1 * scX, CANVAS_RES_Y - el.z1 * scY); 
                        ctx.lineTo(el.x2 * scX, CANVAS_RES_Y - el.z2 * scY);
                        ctx.lineCap = 'round'; 
                        
                        if (el.material === MAT_IMPERMEABLE) { 
                            ctx.strokeStyle = (showResults && currentUi.showFlowLines) ? '#f97316' : 'rgb(30, 41, 59)'; 
                            ctx.lineWidth = (showResults && currentUi.showFlowLines) ? 2.5 / zL : el.width * scX; 
                        }
                        else if (el.material === MAT_WATER) { ctx.strokeStyle = 'rgb(59, 130, 246)'; ctx.lineWidth = 3 / zL; }
                        else if (el.material === MAT_SOIL_CLAY) { ctx.strokeStyle = 'rgb(168, 162, 158)'; ctx.lineWidth = el.width * scX; }
                        else if (el.material === MAT_SOIL_SAND) { ctx.strokeStyle = 'rgb(252, 211, 77)'; ctx.lineWidth = el.width * scX; }
                        else if (el.material === MAT_SOIL_UNIT) { ctx.strokeStyle = 'rgb(52, 211, 153)'; ctx.lineWidth = el.width * scX; }
                        else { ctx.strokeStyle = 'rgb(214, 192, 166)'; ctx.lineWidth = el.width * scX; }
                        ctx.stroke();

                        if (isSelected) {
                            ctx.save();
                            ctx.strokeStyle = '#ef4444'; 
                            ctx.lineWidth = 2 / zL;
                            ctx.setLineDash([6/zL, 6/zL]);
                            ctx.stroke();
                            ctx.fillStyle = '#ef4444';
                            ctx.fillRect(el.x1 * scX - 4/zL, CANVAS_RES_Y - el.z1 * scY - 4/zL, 8/zL, 8/zL);
                            ctx.fillRect(el.x2 * scX - 4/zL, CANVAS_RES_Y - el.z2 * scY - 4/zL, 8/zL, 8/zL);
                            ctx.restore();
                        }

                    } else if (el.type === 'polygon') {
                        
                        if (currentUi.showHeatmap && showResults && !isPreview && !isSelected && el.material !== MAT_IMPERMEABLE) {
                            ctx.beginPath();
                            ctx.moveTo(el.points[0].x * scX, CANVAS_RES_Y - el.points[0].z * scY);
                            for(let i=1; i<el.points.length; i++) {
                                ctx.lineTo(el.points[i].x * scX, CANVAS_RES_Y - el.points[i].z * scY);
                            }
                            ctx.closePath();
                            let strokeColor = 'rgb(140, 110, 80)'; 
                            if (el.material === MAT_SOIL_CLAY) strokeColor = 'rgb(100, 95, 90)'; 
                            else if (el.material === MAT_SOIL_SAND) strokeColor = 'rgb(180, 140, 40)'; 
                            else if (el.material === MAT_SOIL_UNIT) strokeColor = 'rgb(6, 95, 70)';
                            ctx.lineWidth = 3 / zL; 
                            ctx.lineCap = 'round';
                            ctx.strokeStyle = strokeColor;
                            ctx.stroke();
                            return; 
                        }
                        
                        if (el.points.length < 2) return;

                        ctx.beginPath();
                        ctx.moveTo(el.points[0].x * scX, CANVAS_RES_Y - el.points[0].z * scY);
                        for(let i=1; i<el.points.length; i++) {
                            ctx.lineTo(el.points[i].x * scX, CANVAS_RES_Y - el.points[i].z * scY);
                        }
                        if (!isPreview) ctx.closePath();

                        let fillColor = 'rgba(214, 192, 166, 0.5)';
                        let strokeColor = 'rgb(214, 192, 166)';
                        if (el.material === MAT_IMPERMEABLE) { 
                            fillColor = 'rgba(30, 41, 59, 1.0)'; 
                            strokeColor = (showResults && currentUi.showFlowLines) ? '#f97316' : 'rgb(15, 23, 42)'; 
                        }
                        else if (el.material === MAT_SOIL_CLAY) { fillColor = 'rgba(168, 162, 158, 0.5)'; strokeColor = 'rgb(168, 162, 158)'; }
                        else if (el.material === MAT_SOIL_SAND) { fillColor = 'rgba(252, 211, 77, 0.5)'; strokeColor = 'rgb(252, 211, 77)'; }
                        else if (el.material === MAT_SOIL_UNIT) { fillColor = 'rgba(167, 243, 208, 0.5)'; strokeColor = 'rgb(52, 211, 153)'; }

                        if (!isPreview) {
                            ctx.fillStyle = fillColor;
                            ctx.fill();
                        }

                        ctx.lineWidth = (el.material === MAT_IMPERMEABLE && showResults && currentUi.showFlowLines) ? 2.5 / zL : 2 / zL;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = isPreview ? '#f43f5e' : strokeColor;
                        
                        if (isPreview) {
                            ctx.setLineDash([5/zL, 5/zL]);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = '#f43f5e';
                            el.points.forEach(p => {
                                ctx.beginPath();
                                ctx.arc(p.x * scX, CANVAS_RES_Y - p.z * scY, 4/zL, 0, 2*Math.PI);
                                ctx.fill();
                            });
                        } else {
                            if (!showResults || el.material === MAT_IMPERMEABLE) ctx.stroke();
                        }

                        if (isSelected) {
                            ctx.save();
                            ctx.strokeStyle = '#ef4444';
                            ctx.lineWidth = 2 / zL;
                            ctx.setLineDash([6/zL, 6/zL]);
                            ctx.stroke();
                            ctx.fillStyle = '#ef4444';
                            el.points.forEach(p => {
                                ctx.fillRect(p.x * scX - 4/zL, CANVAS_RES_Y - p.z * scY - 4/zL, 8/zL, 8/zL);
                            });
                            ctx.restore();
                        }
                    }
                };

                elements.forEach((el, idx) => drawSingleElement(el, idx));
                if (currentElement) drawSingleElement(currentElement, -1, true);
                if (activePolygon) drawSingleElement(activePolygon, -1, true);

                // --- DRAW BOUNDARY BORDERS (Πιο λεπτή και διακεκομμένη γραμμή) ---
                let leftSoilY = GRID_H, rightSoilY = GRID_H;
                for(let y=0; y<GRID_H; y++) if(gridK[0][y] !== 0 || gridFixed[0][y]) { leftSoilY = y; break; }
                for(let y=0; y<GRID_H; y++) if(gridK[GRID_W-1][y] !== 0 || gridFixed[GRID_W-1][y]) { rightSoilY = y; break; }

                ctx.save();
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)'; // Λίγο πιο διάφανο μαύρο
                ctx.lineWidth = 1.5 / zL; // Πιο λεπτή
                ctx.setLineDash([8 / zL, 8 / zL]); // Διακεκομμένη
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(CANVAS_RES_X, 0); 
                ctx.moveTo(0, 0); ctx.lineTo(0, leftSoilY * cellScaleY); 
                ctx.moveTo(CANVAS_RES_X, 0); ctx.lineTo(CANVAS_RES_X, rightSoilY * cellScaleY); 
                ctx.stroke();
                ctx.restore();

                // --- DRAW PRESSURE DISTRIBUTION ON IMPERMEABLE ---
                if (currentUi.showPressures) {
                    const impPolys = [];
                    const activeElements = [...sim.current.elements];
                    if (sim.current.currentElement) activeElements.push(sim.current.currentElement);
                    if (sim.current.activePolygon) activeElements.push(sim.current.activePolygon);

                    activeElements.forEach(el => {
                        if (el.material === MAT_IMPERMEABLE) {
                            if (el.type === 'polygon' && el.points && el.points.length > 2) {
                                impPolys.push(el.points);
                            } else if (el.type === 'line' && el.x1 !== undefined) {
                                const dx = el.x2 - el.x1;
                                const dz = el.z2 - el.z1;
                                const L = Math.hypot(dx, dz);
                                if (L > 0.01) {
                                    const nx = -dz/L * (el.width / 2);
                                    const nz = dx/L * (el.width / 2);
                                    impPolys.push([
                                        {x: el.x1 + nx, z: el.z1 + nz},
                                        {x: el.x2 + nx, z: el.z2 + nz},
                                        {x: el.x2 - nx, z: el.z2 - nz},
                                        {x: el.x1 - nx, z: el.z1 - nz}
                                    ]);
                                }
                            }
                        }
                    });

                    const checkPointInPoly = (px, pz, polyPoints) => {
                        let inside = false;
                        for (let i = 0, j = polyPoints.length - 1; i < polyPoints.length; j = i++) {
                            const xi = polyPoints[i].x, zi = polyPoints[i].z;
                            const xj = polyPoints[j].x, zj = polyPoints[j].z;
                            const intersect = ((zi > pz) !== (zj > pz)) && (px < (xj - xi) * (pz - zi) / (zj - zi) + xi);
                            if (intersect) inside = !inside;
                        }
                        return inside;
                    };

                    const getRobustPressure = (px, pz, nx, nz) => {
                        // Scan strictly outwards avoiding dead cells (-9999)
                        for (let step = 0.5; step <= 3.0; step += 0.5) {
                            const sx = px + nx * (sim.current.DOMAIN_WIDTH / GRID_W) * step;
                            const sz = pz + nz * (sim.current.DOMAIN_HEIGHT / GRID_H) * step;
                            const gx = Math.floor((sx / sim.current.DOMAIN_WIDTH) * GRID_W);
                            const gy = Math.floor(((sim.current.DOMAIN_HEIGHT - sz) / sim.current.DOMAIN_HEIGHT) * GRID_H);
                            
                            if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
                                if (gridK[gx][gy] > 0 || gridFixed[gx][gy]) {
                                    const h = gridHeads[gx][gy];
                                    if (h > -9000) return Math.max(0, (h - pz) * 10);
                                }
                            }
                        }
                        return 0;
                    };

                    const edges = [];
                    let globalMaxU = 0.001;

                    impPolys.forEach(poly => {
                        for (let i = 0; i < poly.length; i++) {
                            const p1 = poly[i];
                            const p2 = poly[(i + 1) % poly.length];
                            const dx = p2.x - p1.x;
                            const dz = p2.z - p1.z;
                            const L = Math.hypot(dx, dz);
                            if (L < 0.1) continue;

                            let nx = -dz / L;
                            let nz = dx / L;
                            
                            const mx = (p1.x + p2.x) / 2;
                            const mz = (p1.z + p2.z) / 2;
                            if (checkPointInPoly(mx + nx * 0.05, mz + nz * 0.05, poly)) {
                                nx = -nx;
                                nz = -nz;
                            }

                            const pts = [];
                            const numSteps = Math.max(4, Math.ceil(L / 0.5));
                            let hasPressure = false;

                            for (let j = 0; j <= numSteps; j++) {
                                const t = j / numSteps;
                                const px = p1.x + t * dx;
                                const pz = p1.z + t * dz;

                                let u = getRobustPressure(px, pz, nx, nz);
                                
                                if (u > 0) hasPressure = true;
                                if (u > globalMaxU) globalMaxU = u;
                                pts.push({ x: px, z: pz, u });
                            }

                            if (hasPressure) {
                                edges.push({ pts, outNx: nx, outNz: nz });
                            }
                        }
                    });

                    if (edges.length > 0) {
                        const scX = CANVAS_RES_X / sim.current.DOMAIN_WIDTH;
                        const scY = CANVAS_RES_Y / sim.current.DOMAIN_HEIGHT;
                        const scale = (sim.current.DOMAIN_HEIGHT * 0.15) / Math.max(globalMaxU, 1);

                        edges.forEach(edge => {
                            const { pts, outNx, outNz } = edge;
                            
                            ctx.beginPath();
                            ctx.moveTo(pts[0].x * scX, CANVAS_RES_Y - pts[0].z * scY);
                            for (let i = 1; i < pts.length; i++) {
                                ctx.lineTo(pts[i].x * scX, CANVAS_RES_Y - pts[i].z * scY);
                            }
                            for (let i = pts.length - 1; i >= 0; i--) {
                                const px = pts[i].x + outNx * pts[i].u * scale;
                                const pz = pts[i].z + outNz * pts[i].u * scale;
                                ctx.lineTo(px * scX, CANVAS_RES_Y - pz * scY);
                            }
                            ctx.closePath();
                            ctx.fillStyle = 'rgba(168, 85, 247, 0.35)'; // μωβ με διαφάνεια
                            ctx.fill();
                            
                            ctx.strokeStyle = 'rgb(147, 51, 234)';
                            ctx.lineWidth = 1.5 / zL;
                            ctx.stroke();

                            ctx.beginPath();
                            const step = Math.max(1, Math.floor(pts.length / 10));
                            for (let i = 0; i < pts.length; i += step) {
                                if (pts[i].u > 0.1) {
                                    ctx.moveTo(pts[i].x * scX, CANVAS_RES_Y - pts[i].z * scY);
                                    const px = pts[i].x + outNx * pts[i].u * scale;
                                    const pz = pts[i].z + outNz * pts[i].u * scale;
                                    ctx.lineTo(px * scX, CANVAS_RES_Y - pz * scY);
                                }
                            }
                            if (pts.length % step !== 1 && pts[pts.length-1].u > 0.1) {
                                const last = pts.length - 1;
                                ctx.moveTo(pts[last].x * scX, CANVAS_RES_Y - pts[last].z * scY);
                                const px = pts[last].x + outNx * pts[last].u * scale;
                                const pz = pts[last].z + outNz * pts[last].u * scale;
                                ctx.lineTo(px * scX, CANVAS_RES_Y - pz * scY);
                            }
                            ctx.strokeStyle = 'rgba(147, 51, 234, 0.6)';
                            ctx.lineWidth = 1 / zL;
                            ctx.stroke();

                            const labelIndices = [0, Math.floor(pts.length/2), pts.length-1];
                            labelIndices.forEach(idx => {
                                const pt = pts[idx];
                                if (pt.u > 1.0) {
                                    const px = pt.x + outNx * pt.u * scale;
                                    const pz = pt.z + outNz * pt.u * scale;
                                    
                                    ctx.save();
                                    ctx.font = `bold ${10/zL}px sans-serif`;
                                    const text = `${pt.u.toFixed(1)}`;
                                    const tWidth = ctx.measureText(text).width + 6/zL;
                                    const tX = px * scX;
                                    const tY = CANVAS_RES_Y - pz * scY;

                                    ctx.translate(tX, tY);
                                    ctx.scale(1/tf, 1);
                                    ctx.fillStyle = 'rgba(255,255,255,0.85)';
                                    ctx.fillRect(-tWidth/2, -6/zL, tWidth, 12/zL);
                                    ctx.fillStyle = '#6b21a8'; 
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.fillText(text, 0, 0);
                                    ctx.restore();
                                }
                            });

                            // +++ ΥΠΟΛΟΓΙΣΜΟΣ ΚΑΙ ΣΧΕΔΙΑΣΗ ΣΥΝΙΣΤΑΜΕΝΗΣ ΔΥΝΑΜΗΣ (F) +++
                            let F_total = 0;
                            let Mx = 0;
                            let Mz = 0;

                            for (let i = 0; i < pts.length - 1; i++) {
                                const p1 = pts[i];
                                const p2 = pts[i+1];
                                const dx = p2.x - p1.x;
                                const dz = p2.z - p1.z;
                                const dl = Math.hypot(dx, dz);

                                const u1 = p1.u;
                                const u2 = p2.u;

                                if (u1 + u2 > 0) {
                                    const dF = 0.5 * (u1 + u2) * dl;
                                    const dist_c = (dl / 3) * (u1 + 2 * u2) / (u1 + u2);
                                    const cx = p1.x + (dx / dl) * dist_c;
                                    const cz = p1.z + (dz / dl) * dist_c;

                                    F_total += dF;
                                    Mx += dF * cx;
                                    Mz += dF * cz;
                                }
                            }

                            if (F_total > 0.1) {
                                const CPx = Mx / F_total;
                                const CPz = Mz / F_total;

                                const tipX = CPx * scX;
                                const tipY = CANVAS_RES_Y - CPz * scY;
                                const arrowLen = 50 / zL;

                                ctx.save();
                                ctx.translate(tipX, tipY);
                                ctx.scale(1/tf, 1); // Ακύρωση του tf ώστε να μη παραμορφωθεί το βέλος
                                
                                // Η δύναμη σπρώχνει ΠΡΟΣ τον τοίχο, άρα αντίθετα από το outN
                                // Στον καμβά, το Y κοιτάει προς τα κάτω, άρα +outNz
                                const angle = Math.atan2(outNz, -outNx);
                                ctx.rotate(angle);

                                // Στέλεχος του βέλους
                                ctx.beginPath();
                                ctx.moveTo(-arrowLen, 0);
                                ctx.lineTo(0, 0);
                                ctx.strokeStyle = '#dc2626'; // Έντονο κόκκινο
                                ctx.lineWidth = 3.5 / zL;
                                ctx.lineCap = 'round';
                                ctx.stroke();

                                // Κεφαλή του βέλους
                                const headLen = 14 / zL;
                                ctx.beginPath();
                                ctx.moveTo(0, 0);
                                ctx.lineTo(-headLen * Math.cos(Math.PI / 7), -headLen * Math.sin(Math.PI / 7));
                                ctx.lineTo(-headLen * Math.cos(Math.PI / 7), headLen * Math.sin(Math.PI / 7));
