                                                    draw(); // Άμεση ζωγραφιά, δε χάνεται!
                                                }}
                                                className={`w-full mt-1 py-1.5 text-[10px] font-bold rounded flex justify-center items-center gap-1 transition ${uiState.showPressures ? 'bg-purple-600 text-white border border-purple-700 shadow-inner' : 'bg-purple-50 text-purple-700 border border-purple-200 hover:bg-purple-100'}`}
                                            >
                                                <Activity size={12} /> Κατανομή Πιέσεων
                                            </button>
                                        </div>
                                    )}

                                    {/* Toggle Button */}
                                    <button 
                                        onClick={() => setUi({ isResultsBoxOpen: !uiState.isResultsBoxOpen })}
                                        className={`flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg font-bold text-[11px] transition-all active:scale-95 border ${
                                            sim.current.hasResults 
                                                ? (uiState.isResultsBoxOpen ? 'bg-blue-100 text-blue-800 border-blue-300 hover:bg-blue-200' : 'bg-blue-600 text-white border-blue-700 hover:bg-blue-700') 
                                                : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'
                                        }`}
                                    >
                                        <ClipboardList size={14} className={sim.current.hasResults && !uiState.isResultsBoxOpen ? "text-white" : ""} /> 
                                        {uiState.isResultsBoxOpen ? 'Απόκρυψη Αποτελεσμάτων' : 'Εμφάνιση Αποτελεσμάτων'}
                                    </button>
                                </div>

                                {/* --- RULER OVERLAY --- */}
                                <canvas ref={rulerCanvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-20" />

                                {/* Legend */}
                                {legend.min !== '-' && (
                                    <div className="absolute top-[26px] right-[26px] bg-white/95 backdrop-blur border border-slate-200 px-5 py-3 rounded-2xl shadow-lg flex items-center gap-4 text-sm font-bold text-slate-800 pointer-events-none z-40">
                                        <span className="text-base px-1">{uiState.heatmapType === 'head' ? 'h :' : uiState.heatmapType === 'pressure' ? 'u :' : 'v :'}</span>
                                        <span className="font-mono min-w-[2.5rem] text-right text-base">{legend.min}</span>
                                        <div className="flex h-5 w-64 border border-slate-400 rounded-[3px] overflow-hidden shadow-inner">
                                            {Array.from({ 
                                                length: uiState.heatmapType === 'head' ? Math.max(1, uiState.numEquipotentials) : 
                                                        uiState.heatmapType === 'pressure' ? (typeof legend.max === 'number' && typeof legend.min === 'number' ? Math.max(1, Math.ceil((legend.max - legend.min) / 50)) : 1) : 10 
                                            }).map((_, i, arr) => {
                                                let ratio = i / arr.length;
                                                if (uiState.heatmapType === 'pressure' && typeof legend.min === 'number' && typeof legend.max === 'number') {
                                                    const bandedU = Math.floor(legend.min / 50) * 50 + i * 50;
                                                    ratio = Math.max(0, Math.min(1, (bandedU - legend.min) / (legend.max - legend.min || 1)));
                                                }
                                                const color = uiState.heatmapType === 'head' ? cHead(ratio) : 
                                                              uiState.heatmapType === 'pressure' ? cPress(ratio) : cVel(ratio);
                                                return <div key={i} style={{ flex: 1, backgroundColor: color }} />;
                                            })}
                                        </div>
                                        <span className="font-mono min-w-[2.5rem] text-left text-base">{legend.max}</span>
                                    </div>
                                )}

                                <canvas ref={canvasRef} width={CANVAS_RES_X} height={CANVAS_RES_Y} className="w-full h-full block" 
                                    onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onWheel={handleWheel}
                                    style={{ touchAction: 'none' }} />
                            </div>
                        </div>
                    </div>
                    
                    {/* --- MODAL ΓΙΑ ΕΞΙΣΩΣΗ Q --- */}
                    {uiState.showQModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[95vh]">
                                <div className="bg-slate-900 text-white px-4 py-3 flex justify-between items-center shrink-0">
                                    <h2 className="font-bold flex items-center gap-2 tracking-wide"><ClipboardList size={18} className="text-amber-400"/> Υπολογισμός Παροχής (Q)</h2>
                                    <button onClick={() => setUi({ showQModal: false })} className="text-slate-400 hover:text-white transition"><X size={20} /></button>
                                </div>
                                <div className="p-6 space-y-5 text-sm text-slate-700 overflow-y-auto custom-scrollbar">
                                    
                                    {/* Equation Description */}
                                    <div className="bg-blue-50 text-blue-900 p-4 rounded-xl border border-blue-100 shadow-sm">
                                        <p className="mb-2 text-[13px] text-center">Στη γενική περίπτωση ανισοτροπικού εδάφους με μετασχηματισμό, η παροχή από το δίκτυο ροής δίνεται από την εξίσωση:</p>
                                        <div className="text-center text-xl font-serif mt-3 mb-2 font-bold tracking-widest text-slate-900">
                                            q = k' &middot; &Delta;H &middot; <span className="inline-block align-middle"><span className="block border-b-2 border-slate-900 text-base leading-none pb-0.5">N<sub>f</sub></span><span className="block text-base leading-none pt-0.5">N<sub>d</sub></span></span>
                                        </div>
                                        <span className="text-xs text-blue-700/80 block text-center mt-2">
                                            όπου <strong>k' = &radic;(k<sub>x</sub> &middot; k<sub>y</sub>)</strong> η ισοδύναμη περατότητα.
                                        </span>
                                    </div>

                                    {/* Parameters Grid */}
                                    <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200 text-xs shadow-inner">
                                        <div className="space-y-1.5">
                                            <div className="text-slate-400 font-sans font-bold uppercase tracking-wider mb-2 border-b border-slate-200 pb-1">Εδαφος (Dominant)</div>
                                            <div className="font-mono flex justify-between"><span>k<sub>y</sub>:</span> <strong>{sim.current.dominantK.toFixed(4)} m/d</strong></div>
                                            <div className="font-mono flex justify-between"><span>k<sub>x</sub>:</span> <strong>{(sim.current.dominantK * (uiState.anisotropyEnabled ? sim.current.dominantRatio : 1.0)).toFixed(4)} m/d</strong></div>
                                            <div className="font-mono flex justify-between text-blue-700 pt-1 border-t border-slate-200 mt-1"><span>k':</span> <strong>{Math.sqrt(sim.current.dominantK * sim.current.dominantK * (uiState.anisotropyEnabled ? sim.current.dominantRatio : 1.0)).toFixed(4)} m/d</strong></div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <div className="text-slate-400 font-sans font-bold uppercase tracking-wider mb-2 border-b border-slate-200 pb-1">Δικτυο Ροης</div>
                                            <div className="font-mono flex justify-between"><span>&Delta;H:</span> <strong>{(sim.current.maxHead - sim.current.minHead).toFixed(2)} m</strong></div>
                                            <div className="font-mono flex justify-between"><span>N<sub>f</sub>:</span> <strong>{uiState.numStreamlines}</strong></div>
                                            <div className="font-mono flex justify-between"><span>N<sub>d</sub>:</span> <strong>{uiState.numEquipotentials}</strong></div>
                                        </div>
                                    </div>

                                    {/* Math Operation */}
                                    <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-16 h-16 bg-emerald-100 rounded-bl-full -z-0 opacity-50"></div>
                                        <div className="font-bold text-emerald-900 mb-2 text-xs uppercase tracking-wider relative z-10">Αποτελεσμα Δικτυου (Flownet)</div>
                                        <div className="font-mono text-center text-emerald-800 bg-white p-3 rounded-lg border border-emerald-100 mb-3 shadow-inner text-[13px] relative z-10">
                                            q = {Math.sqrt(sim.current.dominantK * sim.current.dominantK * (uiState.anisotropyEnabled ? sim.current.dominantRatio : 1.0)).toFixed(4)} &times; {(sim.current.maxHead - sim.current.minHead).toFixed(2)} &times; ({uiState.numStreamlines} / {uiState.numEquipotentials})
                                        </div>
                                        <div className="text-center text-xl font-bold text-emerald-700 relative z-10 font-mono tracking-tight">
                                            q<sub>flownet</sub> = {(Math.sqrt(sim.current.dominantK * sim.current.dominantK * (uiState.anisotropyEnabled ? sim.current.dominantRatio : 1.0)) * (sim.current.maxHead - sim.current.minHead) * (uiState.numStreamlines / Math.max(1, uiState.numEquipotentials))).toExponential(2)} m&sup3;/d/m
                                        </div>
                                    </div>

                                    {/* Numerical Comparison */}
                                    <div className="flex justify-between items-center bg-slate-800 text-white p-4 rounded-xl shadow-md border border-slate-700">
                                        <span className="font-bold text-sm text-slate-300">Αριθμητική Επίλυση (Solver):</span>
                                        <span className="font-mono text-xl text-amber-400 font-bold tracking-tight">q<sub>num</sub> = {results.q.toExponential(2)} <span className="text-sm text-amber-500/80">m&sup3;/d/m</span></span>
                                    </div>

                                    {/* FS Calculation */}
                                    <div className="bg-orange-50 p-4 rounded-xl border border-orange-200 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-16 h-16 bg-orange-100 rounded-bl-full -z-0 opacity-50"></div>
                                        <div className="font-bold text-orange-900 mb-2 text-xs uppercase tracking-wider relative z-10">Ασφαλεια εναντι Σωληνωσης (Piping)</div>
                                        <div className="font-mono text-center text-orange-800 bg-white p-3 rounded-lg border border-orange-100 mb-3 shadow-inner text-[13px] relative z-10">
                                            FS = i<sub>c</sub> / i<sub>max</sub> &nbsp;&nbsp;&nbsp; <span className="text-orange-600/80">(με i<sub>c</sub> &approx; 1.0)</span> <br/>
                                            <span className="mt-1 block">FS = 1.0 / {results.iMax > 0 ? results.iMax.toFixed(3) : '-'}</span>
                                        </div>
                                        <div className="text-center text-xl font-bold text-orange-700 relative z-10 font-mono tracking-tight">
                                            FS = {results.fs > 0 ? results.fs.toFixed(2) : '-'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
