                                ctx.lineTo(0, 0);
                                ctx.fillStyle = '#dc2626';
                                ctx.fill();

                                // Ετικέτα τιμής Δύναμης (F)
                                ctx.font = `bold ${11/zL}px sans-serif`;
                                const fText = `F = ${F_total.toFixed(1)} kN/m`;
                                const tWidth = ctx.measureText(fText).width + 8/zL;
                                
                                ctx.translate(-arrowLen - 12/zL - tWidth/2, 0);
                                ctx.rotate(-angle); // Επαναφορά της γωνίας ώστε το κείμενο να είναι πάντα οριζόντιο
                                
                                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                                ctx.fillRect(-tWidth/2, -8/zL, tWidth, 16/zL);
                                ctx.strokeStyle = 'rgba(220, 38, 38, 0.4)';
                                ctx.lineWidth = 1/zL;
                                ctx.strokeRect(-tWidth/2, -8/zL, tWidth, 16/zL);
                                
                                ctx.fillStyle = '#dc2626';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText(fText, 0, 0);

                                ctx.restore();
                            }
                        });
                    }
                }

                if (showResults) {
                    const streamlines = getStreamlines();
                    
                    // HEAD CONTOURS
                    if (currentUi.showEquipotentials && currentUi.heatmapType === 'head') {
                        const step = (sim.current.maxHead - sim.current.minHead) / currentUi.numEquipotentials;
                        for (let i = 1; i < currentUi.numEquipotentials; i++) {
                            const targetH = sim.current.minHead + i * step;
                            drawContourAndLabel(ctx, getSmoothedContourLines(targetH, getHeadAt), targetH.toFixed(1), false, currentUi.showLabels);
                        }
                    }
                    
                    // PRESSURE CONTOURS
                    if (currentUi.heatmapType === 'pressure') {
                        const pRange = sim.current.maxPress - sim.current.minPress;
                        if (pRange > 0) {
                            const step = 50;
                            const firstTick = Math.ceil(sim.current.minPress / step) * step;
                            for (let targetP = firstTick; targetP <= sim.current.maxPress; targetP += step) {
                                drawContourAndLabel(ctx, getSmoothedContourLines(targetP, getPressureAt), targetP.toFixed(0), true, currentUi.showLabels);
                            }
                        }
                    }
                    
                    // VELOCITY CONTOURS
                    if (currentUi.heatmapType === 'velocity') {
                        for (let i = 1; i < 10; i++) drawContourAndLabel(ctx, getSmoothedContourLines(Math.pow(i/10, 2) * sim.current.maxVel, getVelocityMagAt), "", true, false);
                    }

                    if (currentUi.showFlowLines && currentUi.numStreamlines > 1) {
                        ctx.lineWidth = 2.5 / zL; 
                        ctx.strokeStyle = '#f97316'; 
                        streamlines.forEach(path => {
                            ctx.beginPath();
                            if(path.length > 0) ctx.moveTo(path[0].x, path[0].y);
                            for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
                            ctx.stroke();
                        });
                        
                        ctx.beginPath();
                        ctx.moveTo(0, CANVAS_RES_Y);
                        ctx.lineTo(CANVAS_RES_X, CANVAS_RES_Y); 
                        ctx.moveTo(0, 0); ctx.lineTo(0, CANVAS_RES_Y); 
                        ctx.moveTo(CANVAS_RES_X, 0); ctx.lineTo(CANVAS_RES_X, CANVAS_RES_Y); 
                        ctx.stroke();

                        if (currentUi.showCircles && currentUi.numEquipotentials > 0 && currentUi.showEquipotentials && currentUi.heatmapType === 'head') {
                            ctx.strokeStyle = 'rgba(220, 38, 38, 0.8)'; ctx.lineWidth = 1.5 / zL;
                            const step = (sim.current.maxHead - sim.current.minHead) / currentUi.numEquipotentials;
                            const intersections = [];
                            for (let s = 0; s < streamlines.length; s++) {
                                const path = streamlines[s], lineInters = [];
                                for (let k = 0; k <= currentUi.numEquipotentials; k++) {
                                    const targetH = sim.current.maxHead - k * step;
                                    let foundP = null;
                                    for (let i = 0; i < path.length - 1; i++) {
                                        const p1 = path[i], p2 = path[i+1];
                                        const h1 = getHeadAt(p1.x / cellScaleX, p1.y / cellScaleY), h2 = getHeadAt(p2.x / cellScaleX, p2.y / cellScaleY);
                                        if ((h1 >= targetH && h2 <= targetH) || (h1 <= targetH && h2 >= targetH)) {
                                            const t = (targetH - h1) / (h2 - h1); 
                                            foundP = {x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y)};
                                            break;
                                        }
                                    }
                                    lineInters.push(foundP);
                                }
                                intersections.push(lineInters);
                            }
                            
                            for (let s = 0; s < intersections.length - 1; s++) {
                                for (let e = 0; e < currentUi.numEquipotentials; e++) {
                                    const p1 = intersections[s][e], p2 = intersections[s+1][e], p3 = intersections[s+1][e+1], p4 = intersections[s][e+1];    
                                    if (p1 && p2 && p3 && p4) {
                                        const cx = (p1.x + p2.x + p3.x + p4.x) / 4, cy = (p1.y + p2.y + p3.y + p4.y) / 4;
                                        
                                        // Υπολογισμός διαστάσεων στο μετασχηματισμένο σύστημα
                                        const tx1 = p1.x * tf, ty1 = p1.y;
                                        const tx2 = p2.x * tf, ty2 = p2.y;
                                        const tx3 = p3.x * tf, ty3 = p3.y;
                                        const tx4 = p4.x * tf, ty4 = p4.y;

                                        const wMid_t = Math.hypot((tx1+tx4)/2 - (tx2+tx3)/2, (ty1+ty4)/2 - (ty2+ty3)/2);
                                        const hMid_t = Math.hypot((tx1+tx2)/2 - (tx4+tx3)/2, (ty1+ty2)/2 - (ty4+ty3)/2);
                                        
                                        const isSquare = wMid_t < hMid_t * 3 && hMid_t < wMid_t * 3;
                                        const isReasonableSize = wMid_t < (CANVAS_RES_X / 3) && hMid_t < (CANVAS_RES_Y / 2);
                                        
                                        const gridX = Math.floor(cx / cellScaleX);
                                        const gridY = Math.floor(cy / cellScaleY);
                                        const isInsideWall = gridX >= 0 && gridX < GRID_W && gridY >= 0 && gridY < GRID_H && gridK[gridX][gridY] === 0 && !gridFixed[gridX][gridY];

                                        if (isSquare && isReasonableSize && !isInsideWall) {
                                            ctx.save();
                                            ctx.translate(cx, cy);
                                            ctx.scale(1/tf, 1);
                                            ctx.beginPath(); 
                                            ctx.arc(0, 0, Math.min(wMid_t, hMid_t) / 2 * 0.95, 0, 2 * Math.PI); 
                                            ctx.stroke();
                                            ctx.restore();
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // --- DRAW VELOCITY VECTORS (Probes) ---
                    if (currentUi.heatmapType === 'velocity' && sim.current.velocityProbes.length > 0) {
                        sim.current.velocityProbes.forEach(probe => {
                            const { x: px, z: pz } = probe;
                            const gx = (px / sim.current.DOMAIN_WIDTH) * GRID_W;
                            const gy = ((sim.current.DOMAIN_HEIGHT - pz) / sim.current.DOMAIN_HEIGHT) * GRID_H;

                            const v = getContinuousVelocityAt(gx, gy);
                            const mag = Math.hypot(v.x, v.y);

                            if (mag > 0) {
                                const canvasPx = px * (CANVAS_RES_X / sim.current.DOMAIN_WIDTH);
                                const canvasPy = CANVAS_RES_Y - pz * (CANVAS_RES_Y / sim.current.DOMAIN_HEIGHT);

                                const maxV = sim.current.maxVel > 0 ? sim.current.maxVel : 1;
                                const arrowLen = (mag / maxV) * (50 / zL) + (15 / zL); 

                                const dirX = v.x / mag;
                                const dirY = v.y / mag; 

                                const endX = canvasPx + dirX * arrowLen;
                                const endY = canvasPy + dirY * arrowLen;

                                ctx.beginPath();
                                ctx.moveTo(canvasPx, canvasPy);
                                ctx.lineTo(endX, endY);
                                ctx.strokeStyle = '#000000';
                                ctx.lineWidth = 2.5 / zL;
                                ctx.stroke();

                                const headLen = 10 / zL;
                                const angle = Math.atan2(dirY, dirX);
                                ctx.beginPath();
                                ctx.moveTo(endX, endY);
                                ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI / 6), endY - headLen * Math.sin(angle - Math.PI / 6));
                                ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI / 6), endY - headLen * Math.sin(angle + Math.PI / 6));
                                ctx.lineTo(endX, endY);
                                ctx.fillStyle = '#000000';
                                ctx.fill();

                                ctx.beginPath();
                                ctx.arc(canvasPx, canvasPy, 4 / zL, 0, 2 * Math.PI);
                                ctx.fillStyle = '#ef4444';
                                ctx.fill();

                                ctx.save();
                                ctx.font = `bold ${12/zL}px sans-serif`;
                                const text = `${mag.toExponential(2)}`;
                                const tWidth = ctx.measureText(text).width + 6/zL;
                                const tX = endX + dirX * (15/zL);
                                const tY = endY + dirY * (15/zL);

                                ctx.translate(tX, tY);
                                ctx.scale(1/tf, 1);
                                
                                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                                ctx.fillRect(-tWidth/2, -8/zL, tWidth, 16/zL);
                                ctx.fillStyle = '#000';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText(text, 0, 0);
                                ctx.restore();
                            }
                        });
                    }

                    if (currentUi.heatmapType === 'head') {
                        const minH = Math.round(sim.current.minHead);
                        const maxH = Math.round(sim.current.maxHead);
                        setLegend(prev => (prev.min === minH && prev.max === maxH) ? prev : { min: minH, max: maxH });
                    } else if (currentUi.heatmapType === 'pressure') {
                        const minP = Math.round(sim.current.minPress);
                        const maxP = Math.round(sim.current.maxPress);
                        setLegend(prev => (prev.min === minP && prev.max === maxP) ? prev : { min: minP, max: maxP });
                    } else {
                        setLegend(prev => (prev.min === 0 && prev.max === 'Max') ? prev : { min: 0, max: 'Max' });
                    }
                } else {
                    setLegend(prev => (prev.min === '-' && prev.max === '-') ? prev : { min: '-', max: '-' });
                }
                
                ctx.restore();

            }, [getSmoothedContourLines, getStreamlines, drawContourAndLabel, getHeadAt, getPressureAt, getVelocityMagAt, getTransformFactor]);

            // =========================================================================
            // 6. ΣΥΝΑΡΤΗΣΕΙΣ ΕΛΕΓΧΟΥ ΟΘΟΝΗΣ & ZOOM
            // =========================================================================
            const resetView = useCallback(() => {
                sim.current.zoomLevel = 1.0;
                sim.current.panOffset = { x: 0, y: 0 };
                draw();
                drawRulers();
            }, [draw, drawRulers]);

            const handleZoom = useCallback((factor, px = null, py = null) => {
                const oldZoom = sim.current.zoomLevel;
                const newZoom = Math.min(Math.max(0.5, oldZoom * factor), 5.0);
                
                if (newZoom !== oldZoom) {
                    let targetPx = px;
                    let targetPy = py;

                    if (targetPx === null || targetPy === null) {
                        if (canvasRef.current) {
                            const rect = canvasRef.current.getBoundingClientRect();
                            // Σε περίπτωση null δίνουμε το κέντρο, αλλά σε internal pixels
                            targetPx = CANVAS_RES_X / 2;
                            targetPy = CANVAS_RES_Y / 2;
                        }
                    }

                    const pointX = (targetPx - sim.current.panOffset.x) / oldZoom;
                    const pointY = (targetPy - sim.current.panOffset.y) / oldZoom;

                    sim.current.panOffset.x = targetPx - pointX * newZoom;
                    sim.current.panOffset.y = targetPy - pointY * newZoom;
                    sim.current.zoomLevel = newZoom;

                    draw();
                    drawRulers();
                }
            }, [draw, drawRulers]);

            // =========================================================================
            // 7. ΣΥΝΑΡΤΗΣΗ ΕΠΙΛΥΣΗΣ (SOLVER)
            // =========================================================================
            const solveStep = useCallback(() => {
                let maxSweepError = 0;
                const { gridK, gridRatio, gridFixed, gridHeads, GRID_W, GRID_H } = sim.current;
                
                const SWEEPS_PER_FRAME = Math.max(5, Math.floor(150000 / (GRID_W * GRID_H))); 
                
                for (let sweep = 0; sweep < SWEEPS_PER_FRAME; sweep++) {
                    let currentError = 0;
                    for (let x = 0; x < GRID_W; x++) {
                      for (let y = 0; y < GRID_H; y++) {
                        if (gridFixed[x][y]) continue; 
                        const Ky_c = gridK[x][y];
                        if (Ky_c === 0) continue; 
                        
                        const r = ui.current.anisotropyEnabled ? gridRatio[x][y] : 1.0;
                        const Kx_c = Ky_c * r;
                        let numer = 0, denom = 0; 

                        let nx = x - 1, ny = y;
                        if (nx >= 0 && gridK[nx][ny] > 0) {
                             const r_n = ui.current.anisotropyEnabled ? gridRatio[nx][ny] : 1.0;
                             const Kx_n = gridK[nx][ny] * r_n;
                             const Keff_x = (2 * Kx_c * Kx_n) / (Kx_c + Kx_n);
                             numer += Keff_x * gridHeads[nx][ny]; denom += Keff_x;
                        } else if (nx >= 0 && gridFixed[nx][ny]) {
                             numer += Kx_c * gridHeads[nx][ny]; denom += Kx_c; 
                        }

                        nx = x + 1; ny = y;
                        if (nx < GRID_W && gridK[nx][ny] > 0) {
                             const r_n = ui.current.anisotropyEnabled ? gridRatio[nx][ny] : 1.0;
                             const Kx_n = gridK[nx][ny] * r_n;
                             const Keff_x = (2 * Kx_c * Kx_n) / (Kx_c + Kx_n);
                             numer += Keff_x * gridHeads[nx][ny]; denom += Keff_x;
                        } else if (nx < GRID_W && gridFixed[nx][ny]) {
                             numer += Kx_c * gridHeads[nx][ny]; denom += Kx_c;
                        }

                        nx = x; ny = y - 1;
                        if (ny >= 0 && gridK[nx][ny] > 0) {
                             const Keff_y = (2 * Ky_c * gridK[nx][ny]) / (Ky_c + gridK[nx][ny]);
                             numer += Keff_y * gridHeads[nx][ny]; denom += Keff_y;
                        } else if (ny >= 0 && gridFixed[nx][ny]) {
                             numer += Ky_c * gridHeads[nx][ny]; denom += Ky_c;
                        }

                        nx = x; ny = y + 1;
                        if (ny < GRID_H && gridK[nx][ny] > 0) {
                             const Keff_y = (2 * Ky_c * gridK[nx][ny]) / (Ky_c + gridK[nx][ny]);
                             numer += Keff_y * gridHeads[nx][ny]; denom += Keff_y;
                        } else if (ny < GRID_H && gridFixed[nx][ny]) {
                             numer += Ky_c * gridHeads[nx][ny]; denom += Ky_c;
                        }

                        if (denom > 0) {
                            const val = numer / denom;
                            const diff = Math.abs(val - gridHeads[x][y]);
                            if (diff > currentError) currentError = diff;
                            gridHeads[x][y] = gridHeads[x][y] + 1.6 * (val - gridHeads[x][y]); 
                        }
                      }
                    }
                    if (currentError > maxSweepError) maxSweepError = currentError;
                }

                let newHeads = gridHeads.map(row => [...row]);
                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        if (gridK[x][y] === 0 && !gridFixed[x][y]) {
                            newHeads[x][y] = -9999;
                        }
                    }
                }
                
                for (let pass = 0; pass < 3; pass++) {
                    let tempHeads = newHeads.map(row => [...row]);
                    for (let x = 0; x < GRID_W; x++) {
                        for (let y = 0; y < GRID_H; y++) {
                            if (gridK[x][y] === 0 && !gridFixed[x][y]) {
                                let sumH = 0, count = 0;
                                const getH = (nx, ny) => (gridK[nx][ny] > 0 || gridFixed[nx][ny]) ? gridHeads[nx][ny] : newHeads[nx][ny];
                                
                                if (x > 0) { let h = getH(x-1, y); if (h > -9000) { sumH += h; count++; } }
                                if (x < GRID_W-1) { let h = getH(x+1, y); if (h > -9000) { sumH += h; count++; } }
                                if (y > 0) { let h = getH(x, y-1); if (h > -9000) { sumH += h; count++; } }
                                if (y < GRID_H-1) { let h = getH(x, y+1); if (h > -9000) { sumH += h; count++; } }
                                
                                if (count > 0) tempHeads[x][y] = sumH / count;
                            }
                        }
                    }
                    newHeads = tempHeads;
                }

                for (let x = 0; x < GRID_W; x++) {
                    for (let y = 0; y < GRID_H; y++) {
                        gridHeads[x][y] = newHeads[x][y];
                    }
                }

                sim.current.maxError = maxSweepError;
                sim.current.iteration += SWEEPS_PER_FRAME;
                sim.current.hasResults = true;
                
                if (maxSweepError > 0.00001 && ui.current.isSolving) {
                    draw(); 
                    calculateResults(); 
                    updateHighFreqUI();
                    reqRef.current = requestAnimationFrame(solveStep);
                } else {
                    sim.current.hasResults = true;
                    draw(); 
                    calculateResults();
                    updateHighFreqUI();
                    setUi({ isSolving: false });
                }
            }, [updateHighFreqUI, calculateResults, draw, setUi]); 

            // =========================================================================
            // 7.5 ΕΚΚΙΝΗΣΗ ΤΟΥ SOLVER LOOP 
            // =========================================================================
            useEffect(() => {
                if (uiState.isSolving) {
                    reqRef.current = requestAnimationFrame(solveStep);
                }
                return () => {
                    if (reqRef.current) cancelAnimationFrame(reqRef.current);
                };
            }, [uiState.isSolving, solveStep]);

            // =========================================================================
            // 8. ΚΥΡΙΑ ΣΥΝΑΡΤΗΣΗ ΕΝΗΜΕΡΩΣΗΣ (TRIGGER)
            // =========================================================================
            const triggerUpdate = useCallback(() => {
                rasterize();
                draw();
                calculateResults();
                drawRulers();
            }, [rasterize, draw, calculateResults, drawRulers]);

            useEffect(() => {
                triggerUpdate();
                setTimeout(() => drawRulers(), 50); 
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            useEffect(() => {
                if (uiState.heatmapType !== 'velocity') {
                    sim.current.velocityProbes = [];
                    draw();
                }
            }, [uiState.heatmapType, draw]);

            // =========================================================================
            // 9. MOUSE/POINTER EVENTS
            // =========================================================================
            const hitTest = (px, pz) => {
                for (let i = sim.current.elements.length - 1; i >= 0; i--) {
                    const el = sim.current.elements[i];
                    if (el.type === 'line') {
                        const l2 = Math.pow(el.x1 - el.x2, 2) + Math.pow(el.z1 - el.z2, 2);
                        let t = 0;
                        if (l2 > 0) {
                            t = ((px - el.x1) * (el.x2 - el.x1) + (pz - el.z1) * (el.z2 - el.z1)) / l2;
                            t = Math.max(0, Math.min(1, t));
                        }
                        const projX = el.x1 + t * (el.x2 - el.x1);
                        const projZ = el.z1 + t * (el.z2 - el.z1);
                        const dist = Math.hypot(px - projX, pz - projZ);
                        const threshold = (el.width / 2) + 1.5; 
                        if (dist <= threshold) return i;
                    }
                }
                for (let i = sim.current.elements.length - 1; i >= 0; i--) {
                    const el = sim.current.elements[i];
                    if (el.type === 'polygon') {
                        let inside = false;
                        for (let j = 0, k = el.points.length - 1; j < el.points.length; k = j++) {
                            const xi = el.points[j].x, zi = el.points[j].z;
                            const xk = el.points[k].x, zk = el.points[k].z;
                            const intersect = ((zi > pz) !== (zk > pz)) && (px < (xk - xi) * (pz - zi) / (zk - zi) + xi);
                            if (intersect) inside = !inside;
                        }
                        if (inside) return i;
                    }
                }
                return null;
            };

            const getCoords = (e, applySnap = false) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX_css = CANVAS_RES_X / rect.width;
                const scaleY_css = CANVAS_RES_Y / rect.height;
                
                let px = (e.clientX - rect.left) * scaleX_css;
                let py = (e.clientY - rect.top) * scaleY_css;
                
                px = (px - sim.current.panOffset.x) / sim.current.zoomLevel;
                py = (py - sim.current.panOffset.y) / sim.current.zoomLevel;
                
                const scaleX_map = sim.current.DOMAIN_WIDTH / CANVAS_RES_X; 
                const scaleY_map = sim.current.DOMAIN_HEIGHT / CANVAS_RES_Y;
                const tf = getTransformFactor();
                
                let mx = (px / tf) * scaleX_map;
                let mz = sim.current.DOMAIN_HEIGHT - (py * scaleY_map);
                
                if (applySnap && ui.current.snapEnabled) {
                    const { GRID_W, GRID_H } = sim.current;
                    const dx = sim.current.DOMAIN_WIDTH / GRID_W;
                    const dz = sim.current.DOMAIN_HEIGHT / GRID_H;
                    mx = Math.round(mx / dx) * dx; 
                    mz = Math.round(mz / dz) * dz; 
                }
                return { x: mx, z: mz };
            };

            const handlePointerDown = (e) => {
                if (e.button === 1 || sim.current.isSpacePressed || ui.current.toolMode === 'pan') { 
                    sim.current.isPanning = true; 
                    sim.current.lastPanPoint = { x: e.clientX, y: e.clientY };
                    canvasRef.current.setPointerCapture(e.pointerId);
                    return; 
                }
                if (ui.current.isSolving) return;
                
                if (ui.current.heatmapType !== 'head') {
                    if (ui.current.heatmapType === 'velocity' && (sim.current.hasResults || ui.current.isSolving)) {
                        const { x, z } = getCoords(e, false);
                        sim.current.velocityProbes.push({x, z});
                        draw();
                    }
                    return;
                }

                const isSnapping = true;
                const { x, z } = getCoords(e, isSnapping);

                if (ui.current.toolMode === 'select') {
                    sim.current.dragMoved = false;

                    let hitVertexIdx = null;
                    if (ui.current.selectedElementIndex !== null) {
                        const selEl = sim.current.elements[ui.current.selectedElementIndex];
                        const hitRadius = sim.current.DOMAIN_WIDTH * 0.015 / sim.current.zoomLevel; 
                        
                        if (selEl.type === 'polygon') {
                            const idx = selEl.points.findIndex(p => Math.hypot(p.x - x, p.z - z) < hitRadius);
                            if (idx !== -1) hitVertexIdx = idx;
                        } else if (selEl.type === 'line') {
                            if (Math.hypot(selEl.x1 - x, selEl.z1 - z) < hitRadius) hitVertexIdx = 0;
                            else if (Math.hypot(selEl.x2 - x, selEl.z2 - z) < hitRadius) hitVertexIdx = 1;
                        }
                    }

                    if (hitVertexIdx !== null) {
                        sim.current.snapshotBeforeDrag = JSON.parse(JSON.stringify(sim.current.elements)); // Αποθήκευση για UNDO
                        canvasRef.current.setPointerCapture(e.pointerId);
                        sim.current.isDraggingElement = true;
                        sim.current.draggedPointIndex = hitVertexIdx;
                        draw();
                    } else {
                        const hitIndex = hitTest(x, z);
                        if (hitIndex !== null) {
                            sim.current.snapshotBeforeDrag = JSON.parse(JSON.stringify(sim.current.elements)); // Αποθήκευση για UNDO
                            const el = sim.current.elements[hitIndex];
                            setUi({
                                selectedElementIndex: hitIndex,
                                selectedMaterial: el.material,
                                strokeWidth: el.type === 'line' ? el.width : ui.current.strokeWidth
                            });
                            canvasRef.current.setPointerCapture(e.pointerId);
                            sim.current.isDraggingElement = true;
                            sim.current.draggedPointIndex = null;
                            sim.current.dragStartPos = { x, z };
                            sim.current.dragElementStart = JSON.parse(JSON.stringify(sim.current.elements[hitIndex]));
                            draw(); 
                        } else {
                            setUi({selectedElementIndex: null});
                        }
                    }
                } else {
                    if (ui.current.selectedMaterial === MAT_WATER || ui.current.drawMode === 'line') {
                        canvasRef.current.setPointerCapture(e.pointerId);
                        const widthToUse = ui.current.selectedMaterial === MAT_WATER ? 2 : ui.current.strokeWidth;
                        sim.current.currentElement = { type: 'line', material: ui.current.selectedMaterial, width: widthToUse, headValue: z, x1: x, z1: z, x2: x, z2: z };
                    } else {
                        if (!sim.current.activePolygon) {
                            sim.current.activePolygon = { type: 'polygon', material: ui.current.selectedMaterial, points: [{x,z}, {x,z}] }; 
                            setUi({isDrawingPolygon: true});
                        } else {
                            const pts = sim.current.activePolygon.points;
                            const first = pts[0];
                            const { GRID_W } = sim.current;
                            const dx_snap = sim.current.DOMAIN_WIDTH / GRID_W;
                            
                            if (pts.length > 3 && Math.hypot(x - first.x, z - first.z) < dx_snap * 1.5) {
                                sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                                pts.pop(); 
                                sim.current.elements.push({...sim.current.activePolygon});
                                sim.current.activePolygon = null;
                                sim.current.hasResults = false;
                                sim.current.geometryChanged = true;
                                setUi({isDrawingPolygon: false});
                                triggerUpdate();
                            } else {
                                pts.splice(pts.length - 1, 0, {x, z});
                                draw(); 
                            }
                        }
                    }
                }
            };

            const handlePointerMove = (e) => {
                if (sim.current.isPanning && sim.current.lastPanPoint) {
                    const rect = canvasRef.current.getBoundingClientRect();
                    const scaleX_css = CANVAS_RES_X / rect.width;
                    const scaleY_css = CANVAS_RES_Y / rect.height;

                    const dx = e.clientX - sim.current.lastPanPoint.x;
                    const dy = e.clientY - sim.current.lastPanPoint.y;
                    sim.current.lastPanPoint = { x: e.clientX, y: e.clientY };

                    sim.current.panOffset.x += dx * scaleX_css;
                    sim.current.panOffset.y += dy * scaleY_css;
                    draw();
                    drawRulers();
                    return;
                }

                let { x: exactX, z: exactZ } = getCoords(e, false);
                sim.current.cursorPos = { x: exactX, z: exactZ };
                if (!ui.current.isSolving) updateHighFreqUI(); 
                
                const isActivelyDrawing = !!sim.current.currentElement || !!sim.current.activePolygon || sim.current.isDraggingElement;
                let { x: drawX, z: drawZ } = getCoords(e, isActivelyDrawing);

                if (ui.current.toolMode === 'select' && sim.current.isDraggingElement && ui.current.selectedElementIndex !== null) {
                    const dx = drawX - sim.current.dragStartPos.x;
                    const dz = drawZ - sim.current.dragStartPos.z;
                    
                    if (Math.abs(dx) > 0.001 || Math.abs(dz) > 0.001) {
                        sim.current.dragMoved = true;
                        const el = sim.current.elements[ui.current.selectedElementIndex];
                        const startEl = sim.current.dragElementStart;

                        if (sim.current.draggedPointIndex !== null) {
                            if (el.type === 'polygon') {
                                el.points[sim.current.draggedPointIndex] = { x: drawX, z: drawZ };
                            } else if (el.type === 'line') {
                                if (sim.current.draggedPointIndex === 0) {
                                    el.x1 = drawX; el.z1 = drawZ;
                                } else {
                                    el.x2 = drawX; el.z2 = drawZ;
                                }
                                if (el.material === MAT_WATER) {
                                    el.z1 = drawZ; el.z2 = drawZ;
                                    el.headValue = drawZ;
                                }
                            }
                        } else {
                            if (el.type === 'polygon') {
                                el.points = startEl.points.map(p => ({ x: p.x + dx, z: p.z + dz }));
                            } else if (el.type === 'line') {
                                el.x1 = startEl.x1 + dx; el.z1 = startEl.z1 + dz;
                                el.x2 = startEl.x2 + dx; el.z2 = startEl.z2 + dz;
                                if (el.material === MAT_WATER) {
                                    el.z2 = el.z1; 
                                    el.headValue = el.z1;
                                }
                            }
                        }
                        
                        sim.current.hasResults = false;
                        sim.current.geometryChanged = true;
                        rasterize(); draw();
                    }

                } else if (ui.current.toolMode === 'draw') {
                    if (sim.current.currentElement && sim.current.currentElement.type === 'line') {
                        if (sim.current.currentElement.material === MAT_WATER) drawZ = sim.current.currentElement.z1; 
                        sim.current.currentElement.x2 = drawX;
                        sim.current.currentElement.z2 = drawZ;
                        sim.current.geometryChanged = true;
                        rasterize(); draw();
                    } else if (sim.current.activePolygon) {
                        const pts = sim.current.activePolygon.points;
                        pts[pts.length - 1] = { x: drawX, z: drawZ }; 
                        draw(); 
                    }
                }
            };

            const handlePointerUp = (e) => {
                if (sim.current.isPanning) { 
                    sim.current.isPanning = false; 
                    sim.current.lastPanPoint = null;
                    try { canvasRef.current.releasePointerCapture(e.pointerId); } catch(err) {}
                    return; 
                }
                
                if (ui.current.toolMode === 'select' && sim.current.isDraggingElement) {
                    try { canvasRef.current.releasePointerCapture(e.pointerId); } catch(err) {}
                    sim.current.isDraggingElement = false;
                    sim.current.draggedPointIndex = null;
                    
                    if (sim.current.dragMoved) {
                        if (sim.current.snapshotBeforeDrag) {
                            sim.current.history.push(sim.current.snapshotBeforeDrag); // Αποθήκευση για UNDO
                        }
                        sim.current.geometryChanged = true;
                        triggerUpdate();
                    } else {
                        draw();
                    }
                    sim.current.snapshotBeforeDrag = null;
                } else if (ui.current.toolMode === 'draw') {
                    if (sim.current.currentElement && sim.current.currentElement.type === 'line') {
                        try { canvasRef.current.releasePointerCapture(e.pointerId); } catch(err) {}
                        const el = sim.current.currentElement;
                        if (Math.hypot(el.x1 - el.x2, el.z1 - el.z2) > 0.1) { 
                            sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                            
                            if (el.material === MAT_WATER) {
                                const newMinX = Math.min(el.x1, el.x2);
                                const newMaxX = Math.max(el.x1, el.x2);
                                
                                let updatedElements = [];
                                sim.current.elements.forEach(oldEl => {
                                    if (oldEl.material !== MAT_WATER || oldEl.type !== 'line') {
                                        updatedElements.push(oldEl);
                                        return;
                                    }
                                    const lMinX = Math.min(oldEl.x1, oldEl.x2);
                                    const lMaxX = Math.max(oldEl.x1, oldEl.x2);
                                    
                                    if (lMaxX <= newMinX || lMinX >= newMaxX) {
                                        updatedElements.push(oldEl);
                                    } else {
                                        if (lMinX < newMinX) updatedElements.push({ ...oldEl, x1: lMinX, x2: newMinX });
                                        if (lMaxX > newMaxX) updatedElements.push({ ...oldEl, x1: newMaxX, x2: lMaxX });
                                    }
                                });
                                sim.current.elements = updatedElements;
                            }

                            sim.current.elements.push({...el});
                        }
                        sim.current.currentElement = null;
                        sim.current.hasResults = false; 
                        sim.current.geometryChanged = true;
                        triggerUpdate();
                    }
                }
            };

            const handleWheel = useCallback((e) => {
                e.preventDefault();
                if (!canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX_css = CANVAS_RES_X / rect.width;
                const scaleY_css = CANVAS_RES_Y / rect.height;
                const px = (e.clientX - rect.left) * scaleX_css;
                const py = (e.clientY - rect.top) * scaleY_css;
                handleZoom(e.deltaY < 0 ? 1.1 : 0.9, px, py);
            }, [handleZoom]);

            useEffect(() => {
                const onKeyDown = (e) => { 
                    if (e.code === 'Space') { 
                        sim.current.isSpacePressed = true; 
                    }
                    if (e.code === 'Escape' && sim.current.activePolygon) {
                        sim.current.activePolygon = null;
                        setUi({isDrawingPolygon: false});
                        draw();
                    }
                    if (e.code === 'Enter' && sim.current.activePolygon) {
                        const pts = sim.current.activePolygon.points;
                        if (pts.length > 2) {
                            sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                            pts.pop(); 
                            sim.current.elements.push({...sim.current.activePolygon});
                            sim.current.hasResults = false;
                            sim.current.geometryChanged = true;
                            triggerUpdate();
                        }
                        sim.current.activePolygon = null;
                        setUi({isDrawingPolygon: false});
                    }
                    if ((e.code === 'Delete' || e.code === 'Backspace') && ui.current.selectedElementIndex !== null && !sim.current.isDraggingElement) {
                        handleDeleteSelected();
                    }
                };
                const onKeyUp = (e) => { 
                    if (e.code === 'Space') { 
                        sim.current.isSpacePressed = false; 
                        sim.current.isPanning = false; 
                        sim.current.lastPanPoint = null;
                    } 
                };
                window.addEventListener('keydown', onKeyDown); 
                window.addEventListener('keyup', onKeyUp);
                return () => { window.removeEventListener('keydown', onKeyDown); window.removeEventListener('keyup', onKeyUp); };
            }, [draw, triggerUpdate, setUi]);

            const changeMeshRes = (res) => {
                sim.current.GRID_W = res;
                const newH = Math.round(res / 2);
                sim.current.GRID_H = newH;
                
                sim.current.gridK = Array(res).fill().map(() => Array(newH).fill(0));
                sim.current.gridRatio = Array(res).fill().map(() => Array(newH).fill(1.0));
                sim.current.gridHeads = Array(res).fill().map(() => Array(newH).fill(0));
                sim.current.gridFixed = Array(res).fill().map(() => Array(newH).fill(false));
                
                sim.current.geometryChanged = true;
                sim.current.hasResults = false;
                sim.current.iteration = 0;
                sim.current.maxError = 0;
                
                setUi({ meshRes: res, isSolving: true });
                triggerUpdate();
            };

            const handleClear = () => {
                const { GRID_W, GRID_H } = sim.current;
                sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                sim.current.geometryChanged = true;
                sim.current.elements = [];
                sim.current.iteration = 0;
                sim.current.maxError = 0;
                sim.current.hasResults = false;
                sim.current.activePolygon = null;
                setUi({ isSolving: false, isDrawingPolygon: false, selectedElementIndex: null });
                sim.current.gridK = Array(GRID_W).fill().map(() => Array(GRID_H).fill(0));
                sim.current.gridHeads = Array(GRID_W).fill().map(() => Array(GRID_H).fill(0));
                sim.current.gridFixed = Array(GRID_W).fill().map(() => Array(GRID_H).fill(false));
                triggerUpdate();
            };

            const handleUndo = () => {
                sim.current.geometryChanged = true;
                if (sim.current.activePolygon) {
                    const pts = sim.current.activePolygon.points;
                    if (pts.length > 2) {
                        // Εάν σχεδιάζουμε πολύγωνο, αφαιρούμε το τελευταίο σταθερό σημείο
                        pts.splice(pts.length - 2, 1);
                        draw();
                        return;
                    } else {
                        sim.current.activePolygon = null;
                        setUi({isDrawingPolygon: false});
                        draw();
                        return;
                    }
                } else if (sim.current.history && sim.current.history.length > 0) {
                    sim.current.elements = sim.current.history.pop();
                } else {
                    return; // Τίποτα για να αναιρέσουμε
                }

                sim.current.iteration = 0;
                sim.current.maxError = 0;
                sim.current.hasResults = false;
                setUi({ isSolving: false, selectedElementIndex: null });
                triggerUpdate();
            };

            const handleDeleteSelected = () => {
                if (ui.current.selectedElementIndex !== null) {
                    sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                    sim.current.geometryChanged = true;
                    sim.current.elements.splice(ui.current.selectedElementIndex, 1);
                    setUi({selectedElementIndex: null});
                    sim.current.hasResults = false;
                    triggerUpdate();
                }
            };

            const handleAutoNd = () => {
                if (results.q > 0 && ui.current.numStreamlines > 0 && sim.current.hasResults) {
                    const range = sim.current.maxHead - sim.current.minHead;
                    const activeRatio = ui.current.anisotropyEnabled ? sim.current.dominantRatio : 1.0;
                    const kEq = Math.sqrt(sim.current.dominantK * sim.current.dominantK * activeRatio);
                    const calculatedNd = Math.round(ui.current.numStreamlines * (kEq * range / results.q));
                    setUi({ numEquipotentials: Math.max(1, Math.min(50, calculatedNd)) });
                    draw();
                } else {
                    alert("Παρακαλώ εκτελέστε πρώτα την επίλυση για να υπολογιστεί η ροή.");
                }
            };

            const getMatBtnClass = (mat) => {
                const base = "mat-btn p-1.5 rounded border text-left flex items-center gap-2 transition hover:bg-slate-50";
                const baseBlock = "mat-btn flex-1 p-1.5 rounded border flex flex-col items-center gap-1 transition hover:bg-slate-50 text-center";
                
                if (mat === uiState.selectedMaterial) {
                    if (mat === MAT_IMPERMEABLE) return `${baseBlock} bg-slate-800 text-white ring-2 ring-slate-400 border-transparent`;
                    if (mat === MAT_WATER) return `${baseBlock} bg-blue-600 text-white ring-2 ring-blue-300 border-transparent`;
                    if (mat === MAT_SOIL_UNIT) return `${base} bg-emerald-100 border-emerald-400 text-emerald-900 ring-1 ring-emerald-400`;
                    if (mat === MAT_SOIL_SAND) return `${base} bg-amber-100 border-amber-400 text-amber-900 ring-1 ring-amber-400`;
                    if (mat === MAT_SOIL_CLAY) return `${base} bg-stone-200 border-stone-400 text-stone-800 ring-1 ring-stone-400`;
                    if (mat === MAT_SOIL_DEFAULT) return `${base} bg-orange-50 border-orange-300 text-orange-900 ring-1 ring-orange-300`;
                }
                return (mat === MAT_IMPERMEABLE || mat === MAT_WATER) ? baseBlock : base;
            };

            const handleMaterialSelect = (matId) => {
                if (ui.current.toolMode === 'select' && ui.current.selectedElementIndex !== null) {
                    const el = sim.current.elements[ui.current.selectedElementIndex];
                    if (el.type === 'polygon' && matId === MAT_WATER) return; 
                    
                    sim.current.history.push(JSON.parse(JSON.stringify(sim.current.elements))); // Αποθήκευση για UNDO
                    el.material = matId;
                    sim.current.geometryChanged = true;
                    sim.current.hasResults = false;
                    setUi({ selectedMaterial: matId });
                    triggerUpdate();
                } else {
                    setUi({ selectedMaterial: matId });
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-100 text-slate-800 font-sans overflow-hidden select-none">
                    {/* Header */}
                    <div className="bg-slate-900 text-white px-4 py-2 flex justify-between items-center shadow-md z-30 shrink-0 h-16">
                        <div className="flex items-center gap-3 w-1/3">
                            <img src="https://www.upatras.gr/wp-content/uploads/upatras-2.jpg" alt="UPatras Logo" className="h-10 w-auto object-contain bg-white p-1 rounded-sm" />
                            <div className="flex flex-col">
                                <span className="text-sm font-bold tracking-wider">Τμήμα Πολιτικών Μηχανικών</span>
                                <span className="text-[11px] text-slate-400 mt-0.5">Αν. Καθ. Παναγιώτης Πελέκης</span>
                            </div>
                        </div>
                        <div className="flex-1 flex justify-center items-center">
                             <h1 className="text-sm font-bold text-amber-400 tracking-widest flex items-center gap-2">
                                 <Activity size={18} /> SEEPAGE CAD
                             </h1>
                        </div>
                        <div className="flex items-center justify-end gap-4 text-xs font-mono w-1/3">
                            <div className="hidden sm:block text-slate-300" ref={cursorXRef}>X=0.00 Z=0.00</div>
                            <div className="hidden sm:block text-amber-300 font-bold" ref={cursorValRef}>u=0.0 kPa</div>
                            <div className="bg-slate-800 px-2 py-1 rounded text-slate-400" ref={errorTextRef}>Err: 0.0e+0</div>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden relative">
                        
                        {uiState.isDrawingPolygon && (
                            <div className="absolute top-4 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg text-xs font-bold z-50 animate-pulse pointer-events-none">
                                Κάντε κλικ για κορυφές. [Enter] ή κλικ στην αρχή για κλείσιμο. [Esc] για ακύρωση.
                            </div>
                        )}

                        {/* Sidebar */}
                        <div className="w-64 bg-white border-r border-slate-200 flex flex-col z-20 shadow-lg overflow-y-auto shrink-0 text-xs custom-scrollbar">
                            
                            {/* Tool Selection (Draw, Select, Pan) */}
                            <div className={`p-3 bg-slate-100 border-b border-slate-200 shadow-inner ${uiState.heatmapType !== 'head' ? 'opacity-50 pointer-events-none' : ''}`}>
                                <div className="flex bg-slate-200/70 p-1 rounded-lg border border-slate-300 relative">
                                    <button onClick={() => setUi({ toolMode: 'draw', selectedElementIndex: null })} 
                                        className={`flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-md transition-all z-10 ${uiState.toolMode === 'draw' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:text-blue-600'}`}>
                                         <PenTool size={16} />
                                         <span className="font-bold text-[9px] mt-0.5 uppercase tracking-wider">Σχεδιαση</span>
                                    </button>
                                    <button onClick={() => setUi({ toolMode: 'select', isDrawingPolygon: false })} 
                                        className={`flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-md transition-all z-10 ${uiState.toolMode === 'select' ? 'bg-amber-500 text-white shadow-md' : 'text-slate-600 hover:text-amber-600'}`}>
                                         <MousePointer2 size={16} />
                                         <span className="font-bold text-[9px] mt-0.5 uppercase tracking-wider">Επιλογη</span>
                                    </button>
                                    <button onClick={() => setUi({ toolMode: 'pan', isDrawingPolygon: false, selectedElementIndex: null })} 
                                        className={`flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-md transition-all z-10 ${uiState.toolMode === 'pan' ? 'bg-slate-600 text-white shadow-md' : 'text-slate-600 hover:text-slate-900'}`}>
                                         <Hand size={16} />
                                         <span className="font-bold text-[9px] mt-0.5 uppercase tracking-wider">Pan</span>
                                    </button>
                                </div>
                            </div>

                            {/* Delete Selected Button */}
                            {uiState.toolMode === 'select' && uiState.selectedElementIndex !== null && uiState.heatmapType === 'head' && (
                                <div className="p-3 bg-red-50 border-b border-red-100 flex flex-col gap-2">
                                    <span className="font-bold text-red-600 text-center">Στοιχείο Επιλέχθηκε</span>
                                    <button onClick={handleDeleteSelected} className="w-full py-2 bg-red-600 hover:bg-red-700 text-white rounded font-bold flex items-center justify-center gap-1 transition shadow-sm">
                                        <Trash2 size={14} /> ΔΙΑΓΡΑΦΗ
                                    </button>
                                </div>
                            )}

                            {/* Actions */}
                            <div className="p-3 border-b border-slate-100 flex flex-col gap-2 bg-slate-50">
                                <div className="flex gap-2">
                                    <button onClick={handleUndo} className="flex-1 py-1.5 bg-white border border-slate-200 hover:bg-slate-100 rounded font-semibold flex items-center justify-center gap-1 transition text-[11px]">
                                        <Undo2 size={14} /> Undo
                                    </button>
                                    <button onClick={handleClear} className="flex-1 py-1.5 bg-white border border-slate-200 hover:bg-red-50 text-slate-600 hover:text-red-600 rounded font-semibold flex items-center justify-center gap-1 transition text-[11px]">
                                        <Trash2 size={14} /> Clear
                                    </button>
                                </div>
                                <button onClick={() => setUi({ isSolving: !uiState.isSolving })} 
                                    className={`w-full flex justify-center items-center gap-2 px-3 py-2 rounded-md font-bold text-white transition-all shadow-sm active:scale-95 ${uiState.isSolving ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-600 hover:bg-green-700'}`}>
                                    {uiState.isSolving ? <Pause size={16} /> : <Play size={16} />}
                                    <span>{uiState.isSolving ? 'ΠΑΥΣΗ' : 'ΕΠΙΛΥΣΗ'}</span>
                                </button>
                            </div>

                            {/* View Settings */}
                            <div className="p-3 border-b border-slate-100 bg-white space-y-2">
                                <div className="flex items-center justify-between">
                                    <h3 className="font-bold text-slate-400 uppercase tracking-wider text-[10px]">Προβολη</h3>
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="flex items-center gap-1.5 cursor-pointer">
                                        <input type="checkbox" checked={uiState.showHeatmap} onChange={e => { setUi({ showHeatmap: e.target.checked }); draw(); }} className="w-3.5 h-3.5 text-blue-600 rounded cursor-pointer" />
                                        <span className="font-bold text-slate-700">Map</span>
                                    </label>
                                    <div className="flex flex-1 gap-1 ml-1">
                                        {['head', 'pressure', 'velocity'].map(type => (
                                            <button key={type} onClick={() => { setUi({ heatmapType: type }); draw(); }}
                                                className={`text-[10px] px-2 py-1 rounded border flex-1 text-center leading-none ${uiState.heatmapType === type ? (type==='head'?'bg-blue-100 text-blue-700 border-blue-300 font-bold':type==='pressure'?'bg-purple-100 text-purple-700 border-purple-300 font-bold':'bg-red-100 text-red-700 border-red-300 font-bold') : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100'}`}>
                                                {type === 'head' ? 'h' : type === 'pressure' ? 'u' : 'v'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-x-2 gap-y-1.5 pt-1">
                                    <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 rounded">
                                        <input type="checkbox" checked={uiState.showFlowLines} onChange={e => { setUi({ showFlowLines: e.target.checked }); draw(); }} className="w-3.5 h-3.5 text-orange-600 rounded cursor-pointer" />
                                        <span className="flex-1 truncate text-[10px]">Γραμμές ροής</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 rounded">
                                        <input type="checkbox" checked={uiState.showEquipotentials} onChange={e => { setUi({ showEquipotentials: e.target.checked }); draw(); }} className="w-3.5 h-3.5 text-slate-600 rounded cursor-pointer" />
                                        <span className="flex-1 truncate text-[10px]">Ισοδυναμικές</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 rounded">
                                        <input type="checkbox" checked={uiState.showLabels} onChange={e => { setUi({ showLabels: e.target.checked }); draw(); }} className="w-3.5 h-3.5 text-blue-600 rounded cursor-pointer" />
                                        <span className="flex-1 truncate">Ετικέτες</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer hover:bg-amber-50 p-1 rounded">
                                        <input type="checkbox" checked={uiState.showCircles} onChange={e => { setUi({ showCircles: e.target.checked }); draw(); }} className="w-3.5 h-3.5 text-red-500 rounded cursor-pointer" />
                                        <span className="flex-1 text-red-600 truncate">Κύκλοι</span>
                                    </label>
                                </div>
                            </div>

                            {/* Geometry Params */}
                            <div className="p-3 border-b border-slate-100 bg-blue-50/50 space-y-3">
                                <h3 className="font-bold text-slate-400 uppercase tracking-wider text-[10px]">Γεωμετρια & Παραμετροι</h3>
                                <div>
                                    <label className="font-bold text-slate-600 flex justify-between mb-1"><span>Πλάτος L (m)</span></label>
                                    <input type="number" value={uiState.domainWidth} onChange={e => {
                                        let val = Math.max(10, Math.min(1000, Number(e.target.value)));
                                        sim.current.geometryChanged = true;
                                        sim.current.hasResults = false;
                                        setUi({ domainWidth: val });
                                        sim.current.DOMAIN_WIDTH = val; sim.current.DOMAIN_HEIGHT = val / 2;
                                        triggerUpdate();
                                    }} className="w-full px-2 py-1 text-xs border rounded bg-white focus:outline-none focus:border-blue-500 font-mono text-center" />
                                </div>
                                
                                <div className="pt-1 border-t border-blue-100/50">
                                    <label className="font-bold text-slate-600 flex justify-between mb-1">
                                        <span className="text-[10px]">Πυκνότητα Πλέγματος</span>
                                    </label>
                                    <div className="flex gap-1">
                                        {[50, 100, 200, 400].map(res => (
                                            <button key={res} onClick={() => changeMeshRes(res)}
                                                className={`flex-1 text-[9px] py-1 rounded border font-bold transition ${uiState.meshRes === res ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-50 border-slate-200 shadow-sm'}`}>
                                                L/{res}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="font-bold text-slate-600 flex justify-between mb-1 pt-2 border-t border-blue-100/50">
                                        <span className="text-orange-600">Δίαυλοι (Nf)</span>
                                        <span>{uiState.numStreamlines}</span>
                                    </label>
                                    <input type="range" min="1" max="30" value={uiState.numStreamlines} onChange={e => { setUi({ numStreamlines: Number(e.target.value) }); draw(); }} className="w-full h-1.5 bg-slate-200 rounded-lg cursor-pointer" />
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="font-bold text-slate-600">Ισοδ. (Nd)</label>
                                        <div className="flex items-center gap-1.5">
                                            <button onClick={handleAutoNd} className="text-[9px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded border border-red-200 hover:bg-red-200 font-bold uppercase">Auto</button>
                                            <span className="font-bold">{uiState.numEquipotentials}</span>
                                        </div>
                                    </div>
                                    <input type="range" min="0" max="50" value={uiState.numEquipotentials} onChange={e => { setUi({ numEquipotentials: Number(e.target.value) }); draw(); }} className="w-full h-1.5 bg-slate-200 rounded-lg cursor-pointer" />
                                </div>
                            </div>

                            {/* Materials */}
                            <div className={`p-3 space-y-2 border-b border-slate-100 ${(uiState.heatmapType !== 'head' || (uiState.toolMode === 'select' && uiState.selectedElementIndex === null)) ? 'opacity-50 pointer-events-none' : ''}`}>
                                <div className="flex items-center justify-between">
                                    <h3 className="font-bold text-slate-400 uppercase tracking-wider text-[10px]">Υλικα (Draw Mode)</h3>
                                    <button onClick={() => setUi({ snapEnabled: !uiState.snapEnabled })} className={`text-[10px] px-1.5 py-0.5 rounded border flex items-center gap-1 leading-none ${uiState.snapEnabled ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-500'}`}>
                                        <Magnet size={12} /> <span>{uiState.snapEnabled ? 'ON' : 'OFF'}</span>
                                    </button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => handleMaterialSelect(MAT_IMPERMEABLE)} className={getMatBtnClass(MAT_IMPERMEABLE)}>
                                        <div className="w-full h-4 bg-slate-700 rounded-sm text-[9px] text-white font-mono flex items-center justify-center leading-none">k=0</div>
                                        <div className="text-[10px] font-bold">Αδιαπέρατο</div>
                                    </button>
                                    <button onClick={() => handleMaterialSelect(MAT_WATER)} className={getMatBtnClass(MAT_WATER)}>
                                        <div className="w-full h-4 bg-blue-500 rounded-sm text-[9px] text-white font-mono flex items-center justify-center leading-none">H=z</div>
                                        <div className="text-[10px] font-bold">Νερό</div>
                                    </button>
                                </div>
                                
                                {uiState.selectedMaterial !== MAT_WATER && (
                                    <div className="flex gap-1 mt-1 bg-slate-100 p-1 rounded border border-slate-200">
                                        <button onClick={() => setUi({ drawMode: 'polygon' })}
                                            className={`flex-1 text-[10px] py-1 rounded font-bold transition ${uiState.drawMode === 'polygon' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-200'}`}>
                                            ΠΟΛΥΓΩΝΟ
                                        </button>
                                        <button onClick={() => setUi({ drawMode: 'line' })}
                                            className={`flex-1 text-[10px] py-1 rounded font-bold transition ${uiState.drawMode === 'line' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-200'}`}>
                                            ΓΡΑΜΜΗ
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* Zones */}
                            <div className={`p-3 space-y-2 ${(uiState.heatmapType !== 'head' || (uiState.toolMode === 'select' && uiState.selectedElementIndex === null)) ? 'opacity-50 pointer-events-none' : ''}`}>
                                <div className="border border-purple-200 rounded p-1.5 bg-purple-50">
                                    <label className="flex items-center gap-2 font-bold text-purple-700 cursor-pointer">
                                        <input type="checkbox" checked={uiState.anisotropyEnabled} onChange={e => {
                                            sim.current.geometryChanged = true;
                                            sim.current.hasResults = false;
                                            setUi({ anisotropyEnabled: e.target.checked, transformX: false, isSolving: true });
                                            triggerUpdate();
                                        }} className="w-3.5 h-3.5 text-purple-600 rounded cursor-pointer" />
                                        <span className="flex-1 text-[10px]">Ανισοτροπία (kx &gt; ky)</span>
                                    </label>
                                    
                                    {uiState.anisotropyEnabled && (
                                        <label className="flex items-center gap-2 mt-1.5 pt-1.5 border-t border-purple-200/60 font-bold text-blue-700 cursor-pointer transition">
                                            <input type="checkbox" checked={uiState.transformX} onChange={e => {
                                                sim.current.geometryChanged = true;
                                                sim.current.hasResults = false;
                                                setUi({ transformX: e.target.checked, isSolving: true });
                                                triggerUpdate();
                                            }} className="w-3.5 h-3.5 text-blue-600 rounded cursor-pointer" />
                                            <span className="flex-1 text-[10px]">Μετασχηματισμός X (x&radic;(k<sub>y</sub>/k<sub>x</sub>))</span>
                                        </label>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 gap-1.5 mt-2">
                                    {[ 
                                        { id: MAT_SOIL_UNIT, name: 'ΜΟΝΑΔΙΑΙΟ', desc: 'kx = ky', bg: 'bg-emerald-400', lbl: 'k1' },
                                        { id: MAT_SOIL_SAND, name: 'Άμμος', desc: 'kx = ky', bg: 'bg-amber-400', lbl: 'ks' },
                                        { id: MAT_SOIL_DEFAULT, name: 'ΙΛΥΣ', desc: 'kx = 2 ky', bg: 'bg-orange-300', lbl: 'k2' },
                                        { id: MAT_SOIL_CLAY, name: 'Άργιλος', desc: 'kx = 5 ky', bg: 'bg-stone-500', lbl: 'k5' }
                                    ].map(mat => (
                                        <button key={mat.id} onClick={() => handleMaterialSelect(mat.id)} className={getMatBtnClass(mat.id)}>
                                            <div className={`w-5 h-5 ${mat.bg} rounded-sm flex items-center justify-center text-[8px] text-white font-mono shrink-0`}>{mat.lbl}</div>
                                            <div className="text-left">
                                                <div className="text-[11px] font-bold leading-none">{mat.name} <span className="font-mono font-normal text-slate-500 ml-1">k={K_DISPLAY[mat.id]} (m/d)</span></div>
                                                <div className="text-[9px] opacity-70 leading-none mt-0.5">{mat.desc}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                {((uiState.toolMode === 'select' && uiState.selectedElementIndex !== null && sim.current.elements[uiState.selectedElementIndex]?.type === 'line') || (uiState.toolMode !== 'select' && uiState.drawMode === 'line')) && uiState.selectedMaterial !== MAT_WATER && (
                                    <div className="pt-2 border-t border-slate-100 mt-2">
                                        <label className="text-[10px] font-bold text-slate-500 flex justify-between mb-1">ΠΛΑΤΟΣ ΓΡΑΜΜΗΣ: <span>{uiState.strokeWidth}m</span></label>
                                        <input type="range" min="1" max="30" value={uiState.strokeWidth} onChange={e => {
                                            const val = Number(e.target.value);
                                            setUi({ strokeWidth: val });
                                            if (ui.current.toolMode === 'select' && ui.current.selectedElementIndex !== null) {
                                                const el = sim.current.elements[ui.current.selectedElementIndex];
                                                if (el.type === 'line') {
                                                    el.width = val;
                                                    sim.current.geometryChanged = true;
                                                    sim.current.hasResults = false;
                                                    triggerUpdate();
                                                }
                                            }
                                        }} className="w-full h-1.5 bg-slate-200 rounded-lg cursor-pointer" />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Canvas Area */}
                        <div className="flex-1 bg-slate-200 flex items-center justify-center relative p-2 md:p-4 overflow-hidden min-w-0">
                            <div ref={wrapperRef} 
                                 className="relative shadow-2xl bg-white w-full max-w-[1000px]" 
                                 style={{ 
                                     aspectRatio: '2/1', 
                                     cursor: uiState.toolMode === 'pan' ? (sim.current.isPanning ? 'grabbing' : 'grab') : (uiState.toolMode === 'select' ? 'default' : 'crosshair') 
                                 }}>
                                
                                {/* Zoom Controls */}
                                <div className="absolute bottom-6 left-6 flex flex-col gap-1 z-30">
                                    <button onClick={() => handleZoom(1.2)} className="bg-white p-3 rounded shadow border border-slate-200 hover:bg-slate-50"><Plus size={20} className="text-slate-600" /></button>
                                    <button onClick={() => handleZoom(1/1.2)} className="bg-white p-3 rounded shadow border border-slate-200 hover:bg-slate-50"><Minus size={20} className="text-slate-600" /></button>
                                    <button onClick={resetView} className="bg-white p-3 rounded shadow border border-slate-200 hover:bg-slate-50"><Maximize size={20} className="text-slate-600" /></button>
                                </div>

                                {/* Results Box & Toggle Button */}
                                <div className="absolute bottom-6 right-6 z-30 flex flex-col items-end gap-2">
                                    {uiState.isResultsBoxOpen && (
                                        <div className="bg-white/95 backdrop-blur border border-slate-300 shadow-lg rounded-lg p-3 w-60 flex flex-col gap-2">
                                            <div className="flex justify-between items-center border-b border-slate-200 pb-1">
                                                <h3 className="text-xs font-bold text-slate-800 flex items-center gap-1">
                                                    <ClipboardList size={12} className="text-blue-600" /> Αποτελέσματα
                                                </h3>
                                                <button onClick={() => setUi({ isResultsBoxOpen: false })} className="text-slate-400 hover:text-slate-700 transition-colors">
                                                    <X size={14} />
                                                </button>
                                            </div>
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-slate-500">Παροχή (Q):</span>
                                                <span className="font-mono font-bold text-blue-700">{results.q === 0 ? '-' : `${results.q.toExponential(2)} m³/d/m`}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-slate-500">i<sub>max</sub> (Exit):</span>
                                                <span className="font-mono font-bold text-slate-700">{results.iMax === 0 ? '-' : results.iMax.toFixed(2)}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs mt-1 pt-1 border-t border-slate-100">
                                                <span className="text-slate-500 font-bold">FS (Piping):</span>
                                                <span className={`font-mono font-bold px-1.5 py-0.5 rounded ${results.fs === 0 ? 'text-slate-500 bg-slate-100' : results.fs < 1.0 ? 'text-red-600 bg-red-100' : results.fs < 1.5 ? 'text-orange-600 bg-orange-100' : 'text-green-600 bg-green-100'}`}>
                                                    {results.fs > 0 ? results.fs.toFixed(2) : '-'}
                                                </span>
                                            </div>

                                            {/* Q Modal Button */}
                                            <button 
                                                onClick={() => setUi({ showQModal: true })}
                                                disabled={!sim.current.hasResults}
                                                className={`w-full mt-1 py-1.5 text-[10px] font-bold rounded flex justify-center items-center gap-1 transition ${sim.current.hasResults ? 'bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100' : 'bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed'}`}
                                            >
                                                <Calculator size={12} /> Υπολογισμός Παροχής
                                            </button>

                                            {/* Pressure Distribution Button */}
                                            <button 
                                                onClick={() => {
                                                    setUi({ showPressures: !uiState.showPressures });
